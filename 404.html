<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌵 Кактус РБикс — 404</title>
    <style>
        body {
            background: #08080e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .error {
            max-width: 400px;
        }
        .error h1 {
            font-size: 60px;
            color: #00d26a;
            margin: 0;
        }
        .error p {
            color: #8f94a3;
            font-size: 18px;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 40px;
            background: #00d26a;
            color: #0c1a12;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="error">
        <h1>🌵</h1>
        <h1>404</h1>
        <p>Такой страницы нет</p>
        <a href="/" class="btn">На главную</a>
    </div>
</body>
</html>

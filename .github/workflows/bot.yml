name: Aqua Checker Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pillow aiohttp aiogram
    
    - name: Create directories
      run: |
        mkdir -p reports images zips
    
    - name: Generate reports
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        python bot.py &
        sleep 15
        pkill -f "python bot.py" || true
    
    - name: Deploy to gh-pages
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Переключаемся на gh-pages
        if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
          git fetch origin gh-pages
          git checkout gh-pages
        else
          git checkout --orphan gh-pages
        fi
        
        # Копируем отчёты и index.html
        mkdir -p reports
        cp -r reports/ ./reports/ 2>/dev/null || true
        cp index.html ./ 2>/dev/null || true
        cp -r images/ ./images/ 2>/dev/null || true
        
        # Удаляем ненужное
        rm -rf .github bot.py requirements.txt .gitignore __pycache__ *.pyc
        
        # Добавляем .nojekyll для GitHub Pages
        touch .nojekyll
        
        # Коммитим и пушим
        git add .
        git commit -m "Deploy: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git push --force origin gh-pages
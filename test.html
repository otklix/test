<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Telegram Sender | Чёрно-белый градиент</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 3D Canvas */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        .card {
            position: relative;
            z-index: 2;
            background: rgba(30, 30, 40, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px;
            max-width: 550px;
            width: 100%;
            margin: 20px auto;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .sub {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 14px;
            text-align: center;
        }

        label {
            color: #ddd;
            font-size: 14px;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            font-size: 14px;
        }

        textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        button {
            background: linear-gradient(135deg, #555, #222);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .user-preview {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            color: white;
            font-weight: bold;
        }

        .user-username {
            color: #aaa;
            font-size: 12px;
        }

        .confirm-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .confirm-buttons button {
            margin-top: 0;
            padding: 10px;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 25px;
            font-size: 13px;
            display: none;
            text-align: center;
        }

        .status.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            display: block;
        }

        .status.error {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
            display: block;
        }

        .status.loading {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #aaa;
            color: #aaa;
            display: block;
        }

        .note {
            font-size: 12px;
            color: #666;
            margin-top: 15px;
            text-align: center;
        }

        hr {
            border-color: rgba(255, 255, 255, 0.1);
            margin: 15px 0;
        }

        .search-section {
            display: flex;
            gap: 10px;
        }

        .search-section input {
            flex: 1;
        }

        .search-section button {
            width: auto;
            margin-top: 0;
            padding: 12px 20px;
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="card">
        <h1>📨 Telegram Sender</h1>
        <div class="sub">Отправка сообщений от имени бота (без ограничений)</div>

        <label>🤖 Токен бота (от @BotFather)</label>
        <input type="text" id="tokenInput" placeholder="1234567890:ABCdefghijklm...">

        <label>👤 Ваш Chat ID (получите у @userinfobot)</label>
        <input type="text" id="chatIdInput" placeholder="123456789">

        <label>🔍 Поиск получателя</label>
        <div class="search-section">
            <input type="text" id="usernameInput" placeholder="@username или ID">
            <button id="searchBtn">🔍 НАЙТИ</button>
        </div>

        <div id="userPreview" style="display: none;"></div>

        <label>💬 Текст сообщения</label>
        <textarea id="messageInput" placeholder="Введите текст..."></textarea>

        <button id="sendBtn">📤 ОТПРАВИТЬ</button>

        <div class="status" id="status"></div>
        <div class="note">⚠️ Данные сохраняются в вашем браузере. Токен и Chat ID никуда не отправляются.</div>
        <div class="note">💡 После подтверждения получателя сообщение отправится один раз (без ограничений).</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // ========== 3D СФЕРА (ФОН) ==========
        const canvas = document.getElementById('bgCanvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 3.5;
        camera.position.y = 0.5;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        canvas.appendChild(renderer.domElement);
        
        // Материал с чёрно-белым градиентом
        const geometry = new THREE.SphereGeometry(1.5, 128, 128);
        const material = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0x111111,
            roughness: 0.3,
            metalness: 0.7,
            flatShading: false
        });
        
        const sphere = new THREE.Mesh(geometry, material);
        scene.add(sphere);
        
        // Добавляем точки (звёзды) вокруг
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 800;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount; i++) {
            starsPositions[i*3] = (Math.random() - 0.5) * 200;
            starsPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starsPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);
        
        // Свет
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1);
        pointLight.position.set(3, 5, 5);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0x888888, 0.5);
        backLight.position.set(-2, -1, -3);
        scene.add(backLight);
        
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;
            sphere.rotation.y = time * 0.3;
            sphere.rotation.x = Math.sin(time * 0.2) * 0.1;
            stars.rotation.y = time * 0.02;
            stars.rotation.x = time * 0.01;
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ========== ЛОГИКА TELEGRAM ==========
        const tokenInput = document.getElementById('tokenInput');
        const chatIdInput = document.getElementById('chatIdInput');
        const usernameInput = document.getElementById('usernameInput');
        const messageInput = document.getElementById('messageInput');
        const searchBtn = document.getElementById('searchBtn');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');
        const userPreviewDiv = document.getElementById('userPreview');
        
        let selectedChatId = null;
        let selectedName = null;
        let selectedUsername = null;
        let selectedPhoto = null;
        
        // Загрузка сохранённых данных
        tokenInput.value = localStorage.getItem('tg_sender_token') || '';
        chatIdInput.value = localStorage.getItem('tg_sender_chatid') || '';
        messageInput.value = localStorage.getItem('tg_sender_message') || '';
        
        tokenInput.oninput = () => localStorage.setItem('tg_sender_token', tokenInput.value);
        chatIdInput.oninput = () => localStorage.setItem('tg_sender_chatid', chatIdInput.value);
        messageInput.oninput = () => localStorage.setItem('tg_sender_message', messageInput.value);
        
        async function callTelegramAPI(method, params) {
            const token = tokenInput.value.trim();
            if (!token) throw new Error('Введите токен бота');
            const url = `https://api.telegram.org/bot${token}/${method}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(params)
            });
            const result = await response.json();
            if (!result.ok) throw new Error(result.description || 'Ошибка API');
            return result.result;
        }
        
        searchBtn.onclick = async () => {
            const username = usernameInput.value.trim();
            if (!username) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Введите @username или ID';
                return;
            }
            
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '⏳ Поиск пользователя...';
            
            try {
                let chatId = username;
                if (username.startsWith('@')) {
                    chatId = username;
                }
                
                const chat = await callTelegramAPI('getChat', { chat_id: chatId });
                selectedChatId = chat.id;
                selectedName = chat.first_name || chat.title;
                selectedUsername = chat.username;
                selectedPhoto = chat.photo?.small_file_id || null;
                
                let photoHtml = '';
                if (selectedPhoto) {
                    photoHtml = `<img src="https://avatars.githubusercontent.com/u/583231?v=4" alt="">`; // заглушка, реальное фото требует file download
                }
                
                userPreviewDiv.style.display = 'block';
                userPreviewDiv.innerHTML = `
                    <div class="user-preview">
                        <div class="user-avatar">
                            ${selectedPhoto ? `<img src="https://via.placeholder.com/50?text=👤">` : '👤'}
                        </div>
                        <div class="user-info">
                            <div class="user-name">${selectedName}</div>
                            <div class="user-username">${selectedUsername ? '@' + selectedUsername : 'ID: ' + selectedChatId}</div>
                        </div>
                    </div>
                    <div class="confirm-buttons">
                        <button id="confirmBtn">✅ ПОДТВЕРДИТЬ</button>
                        <button id="cancelBtn">❌ ОТМЕНА</button>
                    </div>
                `;
                
                document.getElementById('confirmBtn').onclick = () => {
                    userPreviewDiv.style.display = 'none';
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = `✅ Получатель выбран: ${selectedName}`;
                    setTimeout(() => {
                        if (statusDiv.className === 'status success') statusDiv.style.display = 'none';
                        setTimeout(() => { statusDiv.style.display = ''; }, 100);
                    }, 2000);
                };
                
                document.getElementById('cancelBtn').onclick = () => {
                    userPreviewDiv.style.display = 'none';
                    selectedChatId = null;
                    statusDiv.innerHTML = '';
                };
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `✅ Найден: ${selectedName}`;
            } catch (err) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ ${err.message}`;
                selectedChatId = null;
            }
        };
        
        sendBtn.onclick = async () => {
            const token = tokenInput.value.trim();
            const myChatId = chatIdInput.value.trim();
            const message = messageInput.value.trim();
            
            if (!token) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Введите токен бота';
                return;
            }
            if (!myChatId) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Введите ваш Chat ID';
                return;
            }
            if (!selectedChatId) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Сначала найдите и подтвердите получателя';
                return;
            }
            if (!message) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Введите текст сообщения';
                return;
            }
            
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = '⏳ Отправка...';
            
            try {
                const result = await callTelegramAPI('sendMessage', {
                    chat_id: selectedChatId,
                    text: message
                });
                
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `✅ Сообщение отправлено пользователю ${selectedName}`;
                
                // Очищаем после отправки
                selectedChatId = null;
                userPreviewDiv.style.display = 'none';
                messageInput.value = '';
                localStorage.setItem('tg_sender_message', '');
            } catch (err) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ ${err.message}`;
            }
        };
    </script>
</body>
</html>

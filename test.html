<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Telegram Sender | Отправка сообщений от бота</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .sub {
            color: #aaa;
            margin-bottom: 25px;
            font-size: 14px;
        }
        label {
            color: white;
            font-size: 14px;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-family: monospace;
        }
        textarea {
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
        }
        .count-buttons {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .count-btn {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 10px;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .count-btn.active {
            background: #ff4444;
            border-color: #ff8888;
        }
        button {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            padding: 15px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.97);
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
        }
        .status.success {
            background: rgba(76,175,80,0.2);
            border: 1px solid #4caf50;
            color: #4caf50;
            display: block;
        }
        .status.error {
            background: rgba(255,68,68,0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
            display: block;
        }
        .status.loading {
            background: rgba(255,255,255,0.1);
            border: 1px solid #aaa;
            color: #aaa;
            display: block;
        }
        .note {
            font-size: 12px;
            color: #666;
            margin-top: 15px;
            text-align: center;
        }
        hr {
            border-color: rgba(255,255,255,0.1);
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📨 Telegram Sender</h1>
        <div class="sub">Отправка сообщений от имени вашего бота</div>
        
        <label>🤖 Токен бота (от @BotFather)</label>
        <input type="text" id="tokenInput" placeholder="1234567890:ABCdefghijklm...">
        
        <label>👤 Chat ID (ваш Telegram ID)</label>
        <input type="text" id="chatIdInput" placeholder="123456789">
        
        <label>💬 Текст сообщения</label>
        <textarea id="messageInput" placeholder="Введите текст..."></textarea>
        
        <label>🔁 Количество отправок</label>
        <div class="count-buttons">
            <div class="count-btn" data-count="1">1 раз</div>
            <div class="count-btn" data-count="2">2 раза</div>
            <div class="count-btn" data-count="3">3 раза</div>
        </div>
        
        <button id="sendBtn">📤 ОТПРАВИТЬ</button>
        
        <div class="status" id="status"></div>
        <div class="note">⚠️ Данные сохраняются в вашем браузере. Токен и ID никуда не отправляются.</div>
        <hr>
        <div class="note">💡 Подсказка: свой Chat ID можно узнать у бота @userinfobot</div>
    </div>

    <script>
        const tokenInput = document.getElementById('tokenInput');
        const chatIdInput = document.getElementById('chatIdInput');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');
        
        let selectedCount = 1;
        
        // Загрузка сохранённых данных
        const savedToken = localStorage.getItem('tg_sender_token');
        const savedChatId = localStorage.getItem('tg_sender_chatid');
        const savedMessage = localStorage.getItem('tg_sender_message');
        if (savedToken) tokenInput.value = savedToken;
        if (savedChatId) chatIdInput.value = savedChatId;
        if (savedMessage) messageInput.value = savedMessage;
        
        // Выбор количества отправок
        document.querySelectorAll('.count-btn').forEach(btn => {
            if (btn.dataset.count == selectedCount) btn.classList.add('active');
            btn.onclick = () => {
                document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCount = parseInt(btn.dataset.count);
            };
        });
        
        // Сохранение данных при вводе
        tokenInput.oninput = () => localStorage.setItem('tg_sender_token', tokenInput.value);
        chatIdInput.oninput = () => localStorage.setItem('tg_sender_chatid', chatIdInput.value);
        messageInput.oninput = () => localStorage.setItem('tg_sender_message', messageInput.value);
        
        async function sendMessage(token, chatId, text, index, total) {
            const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: text
                })
            });
            return await response.json();
        }
        
        sendBtn.onclick = async () => {
            const token = tokenInput.value.trim();
            const chatId = chatIdInput.value.trim();
            const message = messageInput.value.trim();
            
            if (!token || !chatId) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Введите токен бота и Chat ID';
                return;
            }
            
            if (!message) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Введите текст сообщения';
                return;
            }
            
            statusDiv.className = 'status loading';
            statusDiv.innerHTML = `⏳ Отправка (${selectedCount} раз)...`;
            
            let success = 0;
            let errors = 0;
            
            for (let i = 0; i < selectedCount; i++) {
                try {
                    const result = await sendMessage(token, chatId, message, i + 1, selectedCount);
                    if (result.ok) {
                        success++;
                    } else {
                        errors++;
                        console.error(result);
                    }
                } catch(e) {
                    errors++;
                }
                // Маленькая задержка между отправками
                if (i < selectedCount - 1) await new Promise(r => setTimeout(r, 300));
            }
            
            if (success > 0) {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = `✅ Отправлено! Успешно: ${success}${errors > 0 ? `, ошибок: ${errors}` : ''}`;
                if (success === selectedCount) {
                    statusDiv.innerHTML = `✅ ${selectedCount} сообщение${selectedCount > 1 ? ' отправлена' : ' отправлено'}!`;
                }
            } else {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `❌ Ошибка: не удалось отправить. Проверьте токен и Chat ID.`;
            }
            
            setTimeout(() => {
                if (statusDiv.className !== 'status loading') {
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                        setTimeout(() => { statusDiv.style.display = ''; }, 100);
                    }, 3000);
                }
            }, 2000);
        };
        
        // Отправка по Ctrl+Enter
        messageInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                sendBtn.click();
            }
        });
    </script>
</body>
</html>

        .card {

            border: 1px solid rgba(0,200,255,0.1);

        }
        .btn {
            display: block;
            background: linear-gradient(135deg, #00ccff, #0066ff);
            color: white;
            padding: 14px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            text-align: center;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,200,255,0.3);
        }
        .footer {
            text-align: center;
            color: #446688;
            font-size: 11px;

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍪 Куки Чекер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(0, 220, 80, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(0, 180, 60, 0.05) 0%, transparent 45%),
                linear-gradient(145deg, #080c08 0%, #0d180d 50%, #080c08 100%);
        }

        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 120, 0.08), transparent 70%);
            animation: floatParticle 18s infinite alternate ease-in-out;
        }
        .particle:nth-child(1) { width: 180px; height: 180px; top: 5%; left: 3%; animation-duration: 20s; }
        .particle:nth-child(2) { width: 120px; height: 120px; top: 55%; right: 3%; animation-duration: 24s; animation-delay: 2s; }
        .particle:nth-child(3) { width: 80px; height: 80px; bottom: 8%; left: 35%; animation-duration: 16s; animation-delay: 4s; }

        @keyframes floatParticle {
            0%   { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(50px, -70px) scale(1.6); opacity: 0.7; }
        }

        .main {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 860px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            width: 100%;
            transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 2rem;
        }

        .header.centered {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            z-index: 10;
        }

        .header.moved {
            position: relative;
            top: 0;
            left: 0;
            transform: none;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #80ffa0, #00cc44, #40ff80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            animation: logoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }
        .logo span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px) rotate(3deg);
            animation: letterPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .logo span:nth-child(1) { animation-delay: 0.05s; }
        .logo span:nth-child(2) { animation-delay: 0.10s; }
        .logo span:nth-child(3) { animation-delay: 0.15s; }
        .logo span:nth-child(4) { animation-delay: 0.20s; }
        .logo span:nth-child(5) { animation-delay: 0.25s; }
        .logo span:nth-child(6) { animation-delay: 0.30s; }
        .logo span:nth-child(7) { animation-delay: 0.35s; }
        .logo span:nth-child(8) { animation-delay: 0.40s; }
        .logo span:nth-child(9) { animation-delay: 0.45s; }
        .logo span:nth-child(10) { animation-delay: 0.50s; }

        @keyframes letterPop {
            0%   { opacity: 0; transform: translateY(20px) rotate(3deg) scale(0.7); }
            100% { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
        }
        @keyframes logoIn {
            0%   { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-emoji {
            font-size: 3.2rem;
            -webkit-text-fill-color: initial;
            background: none;
        }

        .underline {
            width: 0%;
            height: 3px;
            margin: 0.6rem auto 0;
            background: linear-gradient(90deg, transparent, #00cc44, #40ff80, #00cc44, transparent);
            border-radius: 4px;
            animation: lineGrow 1.4s ease-out 0.9s forwards;
        }
        @keyframes lineGrow {
            0%   { width: 0%; opacity: 0; }
            100% { width: 60%; opacity: 1; }
        }

        .subtitle {
            color: #5a7a5a;
            font-size: 0.8rem;
            margin-top: 0.6rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 1.4s forwards;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
        }
        .subtitle.show {
            opacity: 1;
        }
        @keyframes fadeUp {
            0%   { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card {
            width: 100%;
            background: rgba(12, 22, 12, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 120, 0.08);
            border-radius: 28px;
            padding: 2rem 1.8rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(0, 255, 120, 0.05);
            opacity: 0;
            transform: translateY(40px);
            animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1.8s forwards;
        }
        @keyframes cardIn {
            0%   { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .cookie-input-area {
            margin-bottom: 1.2rem;
        }
        .cookie-input-area label {
            color: #8aaa8a;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 0.3rem;
        }
        .cookie-input-area textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 120, 0.12);
            background: rgba(0, 255, 80, 0.03);
            color: #d0f0d0;
            font-size: 0.85rem;
            font-family: monospace;
            resize: vertical;
            min-height: 60px;
            transition: 0.3s;
        }
        .cookie-input-area textarea:focus {
            outline: none;
            border-color: rgba(0, 255, 120, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 120, 0.05);
        }
        .cookie-input-area textarea::placeholder {
            color: #4a6a4a;
        }

            border: 2px dashed rgba(0, 255, 120,

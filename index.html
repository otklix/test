<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUA CHECKER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes wave {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        body {
            background: linear-gradient(135deg, #0a0a1a, #1a1a3e, #0a0a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }
        
        .container {
            background: rgba(20,20,50,0.95);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(0,200,255,0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0,200,255,0.1);
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.05), transparent);
            animation: wave 4s infinite;
        }
        
        .logo {
            color: #00ccff;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 3px;
            position: relative;
            z-index: 1;
        }
        
        .logo span { color: #ffffff; }
        
        .subtitle {
            color: #6688aa;
            font-size: 14px;
            margin: 10px 0 25px;
            position: relative;
            z-index: 1;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
            position: relative;
            z-index: 1;
        }
        
        .stat-box {
            background: rgba(0,200,255,0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0,200,255,0.08);
            transition: all 0.3s;
        }
        
        .stat-box:hover {
            transform: scale(1.05);
            background: rgba(0,200,255,0.1);
        }
        
        .stat-box .number {
            font-size: 28px;
            font-weight: 800;
            color: #00ccff;
        }
        
        .stat-box .label {
            font-size: 11px;
            color: #6688aa;
            text-transform: uppercase;
            margin-top: 3px;
        }
        
        .recent {
            position: relative;
            z-index: 1;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,200,255,0.05);
        }
        
        .recent-title {
            color: #00ccff;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .recent a {
            color: #00ccff;
            text-decoration: none;
            display: inline-block;
            margin: 5px 8px;
            padding: 6px 16px;
            background: rgba(0,200,255,0.05);
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid rgba(0,200,255,0.05);
            transition: all 0.3s;
        }
        
        .recent a:hover {
            background: rgba(0,200,255,0.15);
            transform: scale(1.05);
            border-color: rgba(0,200,255,0.2);
        }
        
        .footer {
            color: #446688;
            font-size: 11px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,200,255,0.05);
            position: relative;
            z-index: 1;
        }
        
        .watermark {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 60px;
            opacity: 0.05;
            color: #00ccff;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="watermark">🌊</div>
        <div class="logo">AQUA <span>CHECKER</span></div>
        <div class="subtitle">🌊 Найденные юзернеймы</div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="number">5</div>
                <div class="label">Всего</div>
            </div>
            <div class="stat-box">
                <div class="number" style="color:#4CAF50;">5</div>
                <div class="label">Валидных</div>
            </div>
            <div class="stat-box">
                <div class="number" style="color:#f44336;">0</div>
                <div class="label">Невалидных</div>
            </div>
        </div>
        
        <div class="recent">
            <div class="recent-title">📋 Отчёты:</div>

<a href="reports/dn0w5.html">@dn0w5</a>
<a href="reports/cy9fk.html">@cy9fk</a>
<a href="reports/8nvh8.html">@8nvh8</a>
<a href="reports/3lve0.html">@3lve0</a>

        </div>
        
        <div class="footer">Обновлено: 11.07.2026 13:22</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Кактус РБикс</title>
<meta name="theme-color" content="#00d26a" />
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  body {
    background: #08080e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .card {
    max-width: 400px;
    width: 100%;
    background: #12141c;
    border-radius: 36px;
    padding: 30px 24px 24px;
    border: 1px solid #262a33;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
  }

  .logo {
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .logo span {
    color: #00d26a;
  }

  .logo-sub {
    font-size: 14px;
    color: #8f94a3;
    margin-top: 4px;
    font-weight: 400;
  }

  .order-table {
    margin-top: 28px;
    background: #0c0e14;
    border-radius: 20px;
    padding: 6px 16px;
    border: 1px solid #22262f;
  }

  .row {
    display: flex;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid #1b1e26;
  }
  .row:last-child {
    border-bottom: none;
  }

  .label {
    color: #8f94a3;
    font-size: 16px;
  }
  .value {
    color: #fff;
    font-weight: 600;
    font-size: 16px;
  }
  .value.robux {
    color: #79f8b0;
  }
  .value.price {
    color: #00d26a;
  }

  .badge-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
  }

  .badge {
    background: #1b2a1f;
    border: 1px solid #1f3d2a;
    color: #5dfc8a;
    font-size: 13px;
    padding: 6px 18px;
    border-radius: 40px;
    font-weight: 500;
  }

  .badge i {
    font-style: normal;
    margin-right: 6px;
  }

  .btn {
    margin-top: 24px;
    width: 100%;
    background: #00d26a;
    color: #0c1a12;
    border: none;
    border-radius: 60px;
    padding: 18px 0;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.15s;
    text-align: center;
    display: block;
    text-decoration: none;
  }

  .btn:hover {
    background: #00e676;
    transform: scale(1.01);
    box-shadow: 0 8px 28px rgba(0, 210, 106, 0.25);
  }
  .btn:active {
    transform: scale(0.96);
  }

  .btn-secondary {
    background: transparent;
    color: #8f94a3;
    border: 1px solid #262a33;
    margin-top: 12px;
  }
  .btn-secondary:hover {
    background: #1b1e26;
    border-color: #3a3f4a;
    box-shadow: none;
  }

  .secure {
    margin-top: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #5a606e;
  }

  .secure .lock {
    font-size: 15px;
  }

  .link-box {
    margin-top: 16px;
    padding: 12px;
    background: #0a0c12;
    border-radius: 16px;
    border: 1px dashed #262a33;
    font-size: 13px;
    color: #8f94a3;
    word-break: break-all;
    display: none;
  }
  .link-box a {
    color: #00d26a;
    text-decoration: none;
  }
  .link-box a:hover {
    text-decoration: underline;
  }

  .copy-btn {
    background: #1b1e26;
    border: none;
    color: #8f94a3;
    padding: 8px 16px;
    border-radius: 30px;
    font-size: 13px;
    cursor: pointer;
    margin-top: 10px;
  }
  .copy-btn:hover {
    background: #262a33;
    color: #fff;
  }

  .robux-input {
    width: 100%;
    padding: 14px;
    border-radius: 16px;
    background: #0c0e14;
    border: 1px solid #22262f;
    color: #fff;
    font-size: 16px;
    margin-top: 16px;
    text-align: center;
  }
  .robux-input:focus {
    outline: none;
    border-color: #00d26a;
  }

  .btn-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .btn-group .btn-mini {
    flex: 1;
    min-width: 60px;
    background: #0c0e14;
    border: 1px solid #22262f;
    color: #8f94a3;
    border-radius: 40px;
    padding: 10px 0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
    text-align: center;
  }
  .btn-group .btn-mini:hover {
    border-color: #00d26a;
    color: #00d26a;
  }
  .btn-group .btn-mini.active {
    background: #1b2a1f;
    border-color: #00d26a;
    color: #00d26a;
  }
</style>
</head>
<body>

<div class="card">

  <!-- Логотип -->
  <div class="logo">
    🌵 <span>Кактус</span> РБикс
  </div>
  <div class="logo-sub">Персональный заказ Robux</div>

  <!-- Быстрый выбор -->
  <div class="btn-group">
    <button class="btn-mini" data-robux="160">160</button>
    <button class="btn-mini" data-robux="260">260</button>
    <button class="btn-mini active" data-robux="500">500</button>
    <button class="btn-mini" data-robux="1000">1000</button>
    <button class="btn-mini" data-robux="2500">2500</button>
  </div>

  <!-- Своё количество -->
  <input type="number" class="robux-input" id="robuxInput" value="500" min="1" placeholder="Своё количество" />

  <!-- Таблица ордера -->
  <div class="order-table">
    <div class="row">
      <span class="label">Ордер</span>
      <span class="value" id="orderId">#845217</span>
    </div>
    <div class="row">
      <span class="label">Robux</span>
      <span class="value robux" id="robuxDisplay">500</span>
    </div>
    <div class="row">
      <span class="label">Цена</span>
      <span class="value price" id="priceDisplay">$5.99</span>
    </div>
  </div>

  <!-- Бейдж + ссылка -->
  <div class="badge-row">
    <span class="badge"><i>●</i> Активен</span>
    <span style="color:#5a606e; font-size:13px;">Amirys_bombo</span>
  </div>

  <!-- Блок со ссылкой -->
  <div class="link-box" id="linkBox">
    <span id="linkText">Ссылка:</span><br />
    <a href="#" id="linkUrl" target="_blank">https://...</a>
    <br />
    <button class="copy-btn" id="copyBtn">📋 Копировать</button>
  </div>

  <!-- Кнопка Продолжить -->
  <button class="btn" id="continueBtn">Продолжить</button>

  <!-- Защищённое соединение -->
  <div class="secure">
    <span class="lock">🔒</span> Защищённое соединение
  </div>

</div>

<script>
  // === Элементы ===
  const robuxInput = document.getElementById('robuxInput');
  const robuxDisplay = document.getElementById('robuxDisplay');
  const priceDisplay = document.getElementById('priceDisplay');
  const orderDisplay = document.getElementById('orderId');
  const continueBtn = document.getElementById('continueBtn');
  const linkBox = document.getElementById('linkBox');
  const linkUrl = document.getElementById('linkUrl');
  const copyBtn = document.getElementById('copyBtn');
  const miniBtns = document.querySelectorAll('.btn-mini');

  const PRICE_PER_ROBUX = 0.011; // $0.011 за 1 Robux

  // === Генерация ордера ===
  function generateOrder() {
    const num = String(Math.floor(100000 + Math.random() * 900000));
    orderDisplay.textContent = '#' + num;
  }

  // === Обновление цены и отображения ===
  function updateOrder() {
    let robux = parseInt(robuxInput.value) || 100;
    if (robux < 1) robux = 1;
    robuxDisplay.textContent = robux;
    const price = (robux * PRICE_PER_ROBUX).toFixed(2);
    priceDisplay.textContent = '$' + price;
    generateOrder();
  }

  // === Событие ввода ===
  robuxInput.addEventListener('input', function () {
    miniBtns.forEach(b => b.classList.remove('active'));
    updateOrder();
  });

  // === Клик по мини-кнопке ===
  miniBtns.forEach(btn => {
    btn.addEventListener('click', function () {
      miniBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      robuxInput.value = this.dataset.robux;
      updateOrder();
    });
  });

  // === Кнопка Продолжить — создаём ссылку ===
  continueBtn.addEventListener('click', function () {
    const robux = parseInt(robuxInput.value) || 500;
    const baseUrl = window.location.href.split('?')[0];
    const link = baseUrl + '?robux=' + robux;
    linkUrl.href = link;
    linkUrl.textContent = link;
    linkBox.style.display = 'block';
  });

  // === Копирование ссылки ===
  copyBtn.addEventListener('click', function () {
    const link = linkUrl.href;
    if (link) {
      navigator.clipboard.writeText(link).then(() => {
        alert('✅ Ссылка скопирована!');
      }).catch(() => {
        // fallback
        const textarea = document.createElement('textarea');
        textarea.value = link;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert('✅ Ссылка скопирована!');
      });
    }
  });

  // === Если в URL есть ?robux=XXX — подставить ===
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.has('robux')) {
    const robux = urlParams.get('robux');
    robuxInput.value = robux;
    updateOrder();
    // Показать ссылку сразу
    const baseUrl = window.location.href.split('?')[0];
    const link = baseUrl + '?robux=' + robux;
    linkUrl.href = link;
    linkUrl.textContent = link;
    linkBox.style.display = 'block';
  }

  // === Инициализация ===
  updateOrder();
</script>

</body>
</html>

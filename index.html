<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wait | otklix</title>
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        /* ===== КОНТЕЙНЕР ===== */
        .container {
            max-width: 600px;
            width: 100%;
        }

        /* ===== АНИМАЦИЯ ПРИВЕТСТВИЯ ===== */
        .hero {
            margin-bottom: 3rem;
        }

        .welcome-text {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #58a6ff;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
            animation-delay: 0.2s;
        }

        .main-title {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-top: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.1rem;
        }

        /* Каждая буква — отдельный элемент */
        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: letterAppear 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            color: #ffffff;
        }

        /* Буквы "wait" — с градиентом */
        .letter.gradient {
            background: linear-gradient(135deg, #58a6ff, #f0883e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Буквы "otklix" — белые */
        .letter.white {
            color: #ffffff;
        }

        /* Символ "|" — серый */
        .letter.pipe {
            color: #8b949e;
            font-weight: 300;
        }

        @keyframes letterAppear {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.8);
                filter: blur(4px);
            }
            60% {
                opacity: 1;
                transform: translateY(-5px) scale(1.05);
                filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== КАРТОЧКА (появляется после анимации) ===== */
        .card {
            background: rgba(22, 27, 34, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            opacity: 0;
            animation: fadeIn 1s ease forwards;
            animation-delay: 2.8s; /* Ждём, пока появятся все буквы */
        }

        /* ===== СТАТУС ===== */
        .status {
            background: rgba(13, 17, 23, 0.7);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            margin: 1rem 0;
            border-left: 3px solid #3fb950;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #3fb950;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.8); }
        }

        .status-text {
            color: #7ee787;
            font-weight: 500;
        }

        /* ===== ФИЧИ ===== */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 1.2rem 0;
            font-size: 0.9rem;
        }

        .features span {
            background: rgba(13, 17, 23, 0.6);
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #21262d;
            transition: all 0.3s ease;
        }

        .features span:hover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.05);
            transform: translateX(3px);
        }

        /* ===== КНОПКИ ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 1.2rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #238636, #2ea043);
            color: #fff;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(35, 134, 54, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #8b949e;
            border: 1px solid #30363d;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #58a6ff;
            color: #c9d1d9;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-row .btn {
            flex: 1;
            text-align: center;
        }

        .footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #484f58;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 480px) {
            .main-title {
                font-size: 2.5rem;
            }
            .card {
                padding: 1.5rem;
            }
            .features {
                grid-template-columns: 1fr;
            }
            .btn-row

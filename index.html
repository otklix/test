<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQUA CHECKER — Поиск юзернеймов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ===== АНИМАЦИИ ===== */
        @keyframes waveIn {
            0% { transform: translateX(-100%) scaleY(0.3); opacity: 0; }
            50% { transform: translateX(0%) scaleY(1); opacity: 1; }
            100% { transform: translateX(100%) scaleY(0.3); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        @keyframes letterAppear {
            0% { opacity: 0; transform: translateY(-20px) scale(0.8); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        body {
            background: linear-gradient(135deg, #070720, #0d1b4e, #070720);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
            overflow-x: hidden;
        }

        .container {
            background: rgba(10, 20, 50, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            max-width: 750px;
            width: 100%;
            border: 1px solid rgba(0, 200, 255, 0.1);
            box-shadow: 0 30px 80px rgba(0, 100, 255, 0.15);
            position: relative;
            overflow: hidden;
        }

        /* ===== ВОЛНА НА ФОНЕ ===== */
        .wave-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .wave-bg .wave-layer {
            position: absolute;
            bottom: -5%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(ellipse at 30% 80%, rgba(0, 150, 255, 0.04), transparent 70%);
            animation: waveIn 4s ease-in-out infinite;
        }

        .wave-bg .wave-layer:nth-child(2) {
            bottom: -10%;
            background: radial-gradient(ellipse at 70% 90%, rgba(0, 200, 255, 0.03), transparent 60%);
            animation-delay: 2s;
        }

        /* ===== ЗАГОЛОВОК С АНИМАЦИЕЙ БУКВ ===== */
        .header {
            text-align: center;
            position: relative;
            z-index: 1;
            margin-bottom: 25px;
        }

        .header .title {
            font-size: 48px;
            font-weight: 900;
            color: #00ccff;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(0, 200, 255, 0.2);
        }

        .header .title .letter {
            display: inline-block;
            animation: letterAppear 0.6s ease-out forwards;
            opacity: 0;
        }

        .header .title .letter:nth-child(1) { animation-delay: 0.1s; }
        .header .title .letter:nth-child(2) { animation-delay: 0.2s; }
        .header .title .letter:nth-child(3) { animation-delay: 0.3s; }
        .header .title .letter:nth-child(4) { animation-delay: 0.4s; }
        .header .title .letter:nth-child(5) { animation-delay: 0.5s; }
        .header .title .letter:nth-child(6) { animation-delay: 0.6s; }
        .header .title .letter:nth-child(7) { animation-delay: 0.7s; }
        .header .title .letter:nth-child(8) { animation-delay: 0.8s; }
        .header .title .letter:nth-child(9) { animation-delay: 0.9s; }
        .header .title .letter:nth-child(10) { animation-delay: 1.0s; }
        .header .title .letter:nth-child(11) { animation-delay: 1.1s; }
        .header .title .letter:nth-child(12) { animation-delay: 1.2s; }

        .header .title .letter.white {
            color: #ffffff;
        }

        .header .sub {
            color: #6688aa;
            font-size: 14px;
            margin-top: 5px;
            letter-spacing: 2px;
            animation: fadeIn 1.5s ease-out;
        }

        /* ===== ФИЛЬТРЫ ===== */
        .filters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            position: relative;
            z-index: 1;
            margin: 15px 0;
        }

        .filter-group {
            background: rgba(0, 200, 255, 0.03);
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(0, 200, 255, 0.06);
            transition: 0.3s;
        }

        .filter-group:hover {
            border-color: rgba(0, 200, 255, 0.15);
        }

        .filter-group label {
            display: block;
            color: #6688aa;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 200, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .filter-group input:focus, .filter-group select:focus {
            border-color: #00ccff;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.1);
        }

        .filter-group input::placeholder {
            color: #446688;
        }

        .filter-group select option {
            background: #0a0a2a;
        }

        /* ===== ПРОГРЕСС-БАР ===== */
        .progress-wrap {
            position: relative;
            z-index: 1;
            margin: 15px 0 10px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 200, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ccff, #0066ff);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #6688aa;
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
        }

        /* ===== КНОПКИ ===== */
        .btn {
            display: inline-block;
            padding: 14px 30px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ccff, #0066ff);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 200, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #4CAF50, #2e7d32);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(76, 175, 80, 0.3);
        }

        .btn-outline {
            background: transparent;
            color: #00ccff;
            border: 2px solid rgba(0, 200, 255, 0.3);
            padding: 10px 20px;
            font-size: 14px;
        }

        .btn-outline:hover {
            background: rgba(0, 200, 255, 0.1);
            border-color: #00ccff;
        }

        /* ===== РЕЗУЛЬТАТЫ ===== */
        .result-area {
            position: relative;
            z-index: 1;
            margin-top: 15px;
            display: none;
        }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .stat-card {
            background: rgba(0, 200, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 200, 255, 0.06);
        }

        .stat-card .number {
            font-size: 24px;
            font-weight: 800;
            color: #00ccff;
        }

        .stat-card .label {
            font-size: 10px;
            color: #6688aa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .username-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 10px 0;
            padding-right: 5px;
        }

        .username-list::-webkit-scrollbar {
            width: 4px;
        }
        .username-list::-webkit-scrollbar-track {
            background: rgba(0, 200, 255, 0.05);
            border-radius: 10px;
        }
        .username-list::-webkit-scrollbar-thumb {
            background: #00ccff;
            border-radius: 10px;
        }

        .username-item {
            padding: 6px 12px;
            background: rgba(0, 200, 255, 0.03);
            border-radius: 8px;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .username-item .name {
            color: #00ccff;
            font-weight: 600;
        }

        .username-item .status {
            color: #4CAF50;
            font-size: 12px;
        }

        .username-item .status.taken {
            color: #f44336;
        }

        .report-link-box {
            background: rgba(0, 200, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 200, 255, 0.06);
            margin-top: 15px;
            text-align: center;
        }

        .report-link-box .link {
            color: #00ccff;
            word-break: break-all;
            font-size: 14px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin: 8px 0;
        }

        .report-link-box .copy-btn {
            background: rgba(0, 200, 255, 0.1);
            color: #00ccff;
            border: 1px solid rgba(0, 200, 255, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }

        .report-link-box .copy-btn:hover {
            background: rgba(0, 200, 255, 0.2);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 20, 50, 0.95);
            color: #00ccff;
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(0, 200, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 999;
            font-size: 14px;
            animation: fadeIn 0.3s ease-out;
        }

        /* ===== ФУТЕР ===== */
        .footer {
            text-align: center;
            color: #446688;
            font-size: 11px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 200, 255, 0.05);
            position: relative;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .container { padding: 25px 20px; }
            .filters { grid-template-columns: 1fr; }
            .result-stats { grid-template-columns: 1fr 1fr 1fr; }
            .btn-group { grid-template-columns: 1fr; }
            .header .title { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- ФОН С ВОЛНАМИ -->
        <div class="wave-bg">
            <div class="wave-layer"></div>
            <div class="wave-layer"></div>
        </div>

        <!-- ЗАГОЛОВОК -->
        <div class="header">
            <div class="title">
                <span class="letter">A</span>
                <span class="letter">Q</span>
                <span class="letter">U</span>
                <span class="letter">A</span>
                <span class="letter white"> </span>
                <span class="letter">C</span>
                <span class="letter">H</span>
                <span class="letter">E</span>
                <span class="letter">C</span>
                <span class="letter">K</span>
                <span class="letter">E</span>
                <span class="letter">R</span>
            </div>
            <div class="sub">🔍 Поиск свободных юзернеймов в Telegram</div>
        </div>

        <!-- ФИЛЬТРЫ -->
        <div class="filters">
            <div class="filter-group">
                <label>📏 Длина</label>
                <select id="length">
                    <option value="5">5 символов</option>
                    <option value="6">6 символов</option>
                    <option value="7">7 символов</option>
                    <option value="any">Любая</option>
                </select>
            </div>
            <div class="filter-group">
                <label>🔤 Префикс</label>
                <input type="text" id="prefix" placeholder="Начинается с..." maxlength="5">
            </div>
            <div class="filter-group">
                <label>🔤 Суффикс</label>
                <input type="text" id="suffix" placeholder="Заканчивается на..." maxlength="5">
            </div>
            <div class="filter-group">
                <label>📊 Количество</label>
                <select id="count">
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                    <option value="2000" selected>2000</option>
                </select>
            </div>
        </div>

        <!-- КНОПКА ПОИСКА -->
        <button class="btn btn-primary" id="searchBtn">🚀 Начать поиск</button>

        <!-- ПРОГРЕСС-БАР -->
        <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">⏳ Поиск...</div>
        </div>

        <!-- РЕЗУЛЬТАТЫ -->
        <div class="result-area" id="resultArea">
            <div class="result-stats">
                <div class="stat-card">
                    <div class="number" id="totalCount">0</div>
                    <div class="label">Всего</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#4CAF50;" id="validCount">0</div>
                    <div class="label">Свободных</div>
                </div>
                <div class="stat-card">
                    <div class="number" style="color:#f44336;" id="takenCount">0</div>
                    <div class="label">Занятых</div>
                </div>
            </div>

            <div class="username-list" id="usernameList"></div>

            <div class="report-link-box" id="reportBox">
                <div style="color:#6688aa;font-size:12px;margin-bottom:6px;">📄 Одноразовая ссылка на отчёт:</div>
                <div class="link" id="reportLink">⏳ Сгенерируйте отчёт...</div>
                <button class="copy-btn" onclick="copyLink()">📋 Копировать</button>

                <div class="btn-group">
                    <a href="#" class="btn btn-success" id="openBotBtn" target="_blank">📲 Получить ZIP в Telegram</a>
                    <button class="btn btn-outline" id="fullReportBtn" onclick="generateFullReport()">📄 Полный отчёт</button>
                </div>
            </div>
        </div>

        <div class="footer">AQUA CHECKER • GitHub Pages</div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const BOT_USERNAME = 'Username1FinderBOT';
        const BOT_TOKEN = '8011946729:AAE9t-n-Ur16Kxg0gH-9uUF6SAP6H2Qa-Oo'; // Токен бота

        let foundUsernames = [];
        let checkedUsernames = [];
        let isSearching = false;
        let currentReportId = null;

        function showToast(text) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.style.display = 'block';
            clearTimeout(t._hide);
            t._hide = setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        function copyLink() {
            const link = document.getElementById('reportLink').textContent;
            if (link && link.includes('t.me')) {
                navigator.clipboard.writeText(link).then(() => showToast('✅ Ссылка скопирована!'));
            } else {
                showToast('❌ Сначала сгенерируйте отчёт');
            }
        }

        function generateReportId() {
            return Date.now().toString(36) + '_' + Math.random().toString(36).substring(2, 8);
        }

        function generateUsername(length = 5, prefix = '', suffix = '') {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < length; i++) {
                result += chars[Math.floor(Math.random() * chars.length)];
            }
            if (prefix) result = prefix + result.slice(prefix.length);
            if (suffix) result = result.slice(0, -suffix.length) + suffix;
            return result;
        }

        async function checkUsername(username) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/checkUsername`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                const data = await response.json();
                return data.result || false;
            } catch (e) {
                return false;
            }
        }

        document.getElementById('searchBtn').addEventListener('click', async function() {
            if (isSearching) return;
            isSearching = true;
            this.disabled = true;
            this.textContent = '⏳ Поиск...';

            const length = document.getElementById('length').value;
            const prefix = document.getElementById('prefix').value.toLowerCase().trim();
            const suffix = document.getElementById('suffix').value.toLowerCase().trim();
            const count = parseInt(document.getElementById('count').value);

            const progressWrap = document.getElementById('progressWrap');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const resultArea = document.getElementById('resultArea');

            progressWrap.style.display = 'block';
            resultArea.style.display = 'none';
            foundUsernames = [];
            checkedUsernames = [];

            let found = 0;
            let checked = 0;
            let attempts = 0;
            const maxAttempts = count * 5;
            const used = new Set();

            while (found < count && attempts < maxAttempts) {
                attempts++;
                let len = length === 'any' ? Math.floor(Math.random() * 3) + 5 : parseInt(length);
                let username = generateUsername(len, prefix, suffix);
                if (username.length < 5) continue;
                if (used.has(username)) continue;
                used.add(username);

                checked++;
                const percent = Math.min((checked / (count * 3)) * 100, 100);
                progressFill.style.width = percent + '%';
                progressText.textContent = `🔍 Проверено: ${checked} | Найдено: ${found} / ${count}`;

                const isAvailable = await checkUsername(username);
                checkedUsernames.push({ username, isAvailable });

                if (isAvailable) {
                    found++;
                    foundUsernames.push(username);
                }

                if (found % 10 === 0) await new Promise(r => setTimeout(r, 50));
            }

            progressText.textContent = `✅ Готово! Найдено ${found} юзернеймов`;
            progressFill.style.width = '100%';

            // Показываем результаты
            resultArea.style.display = 'block';
            document.getElementById('totalCount').textContent = foundUsernames.length;
            document.getElementById('validCount').textContent = foundUsernames.length;
            document.getElementById('takenCount').textContent = checkedUsernames.length - foundUsernames.length;

            const list = document.getElementById('usernameList');
            list.innerHTML = '';
            foundUsernames.slice(0, 20).forEach(u => {
                const div = document.createElement('div');
                div.className = 'username-item';
                div.innerHTML = `<span class="name">@${u}</span><span class="status">✅ Свободен</span>`;
                list.appendChild(div);
            });
            if (foundUsernames.length > 20) {
                const div = document.createElement('div');
                div.className = 'username-item';
                div.style.textAlign = 'center';
                div.style.color = '#6688aa';
                div.textContent = `... и ещё ${foundUsernames.length - 20}`;
                list.appendChild(div);
            }

            // Генерируем ссылку
            currentReportId = generateReportId();
            const botLink = `https://t.me/${BOT_USERNAME}?start=report_${currentReportId}`;
            document.getElementById('reportLink').textContent = botLink;
            document.getElementById('openBotBtn').href = botLink;

            // Сохраняем данные
            localStorage.setItem('report_' + currentReportId, JSON.stringify({
                usernames: foundUsernames,
                checked: checkedUsernames,
                count: foundUsernames.length,
                created: Date.now()
            }));

            showToast(`✅ Найдено ${foundUsernames.length} юзернеймов!`);

            isSearching = false;
            this.disabled = false;
            this.textContent = '🚀 Начать поиск';
        });

        function generateFullReport() {
            if (!foundUsernames.length) {
                showToast('❌ Сначала найдите юзернеймы!');
                return;
            }
            // Создаём HTML-отчёт
            const reportId = currentReportId || generateReportId();
            const html = `
        <!DOCTYPE html>
        <html>
        <head><title>AQUA CHECKER — Отчёт</title>
        <style>
            body { background: #0a0a2a; color: #00ccff; font-family: Arial; padding: 40px; }
            .container { max-width: 700px; margin: 0 auto; background: rgba(10,20,50,0.9); border-radius: 20px; padding: 30px; }
            h1 { color: #00ccff; text-align: center; }
            .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 20px 0; }
            .stat { background: rgba(0,200,255,0.05); padding: 15px; border-radius: 12px; text-align: center; }
            .stat .num { font-size: 28px; font-weight: 800; }
            .stat .label { color: #6688aa; font-size: 11px; }
            .list { max-height: 400px; overflow-y: auto; }
            .item { padding: 6px 10px; background: rgba(0,200,255,0.03); border-radius: 8px; margin: 3px 0; }
            .free { color: #4CAF50; float: right; }
            .taken { color: #f44336; float: right; }
            .footer { text-align: center; color: #446688; font-size: 12px; margin-top: 20px; border-top: 1px solid rgba(0,200,255,0.05); padding-top: 15px; }
        </style>
        </head>
        <body>
        <div class="container">
            <h1>🌊 AQUA CHECKER</h1>
            <p style="text-align:center;color:#6688aa;">📊 Полный отчёт</p>
            <div class="stats">
                <div class="stat"><div class="num">${foundUsernames.length}</div><div class="label">Всего</div></div>
                <div class="stat"><div class="num" style="color:#4CAF50;">${foundUsernames.length}</div><div class="label">Свободных</div></div>
                <div class="stat"><div class="num" style="color:#f44336;">${checkedUsernames.length - foundUsernames.length}</div><div class="label">Занятых</div></div>
            </div>
            <div class="list">
                ${foundUsernames.map(u => `<div class="item">@${u} <span class="free">✅ Свободен</span></div>`).join('')}
                ${checkedUsernames.filter(u => !u.isAvailable).slice(0, 10).map(u => `<div class="item">@${u.username} <span class="taken">❌ Занят</span></div>`).join('')}
            </div>
            <div class="footer">Сгенерировано: ${new Date().toLocaleString()}</div>
        </div>
        </body>
        </html>
        `;

            // Скачиваем как HTML
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `report_${reportId}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('✅ Отчёт скачан!');
        }
    </script>
</body>
</html>

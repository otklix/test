<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RB Code</title>
<meta name="theme-color" content="#00d26a">
<style>
:root{
--bg:#050607;
--card:#101214;
--card2:#181b20;
--green:#00d26a;
--green2:#00ff84;
--text:#ffffff;
--gray:#8a8f98;
--border:#242830;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}
html{
scroll-behavior:smooth;
}
body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
min-height:100vh;
}
.background{
position:fixed;
inset:0;
overflow:hidden;
z-index:-1;
}
.circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
opacity:.18;
animation:float 18s infinite linear;
}
.c1{
width:420px;
height:420px;
background:#00ff84;
left:-120px;
top:-80px;
}
.c2{
width:360px;
height:360px;
background:#00bb66;
right:-140px;
bottom:-80px;
animation-duration:22s;
}
@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-80px);}
100%{transform:translateY(0px);}
}
.container{
max-width:430px;
margin:auto;
padding:25px;
}
.logo{
font-size:34px;
font-weight:800;
letter-spacing:.5px;
margin-top:20px;
}
.logo span{
color:var(--green);
}
.subtitle{
margin-top:8px;
font-size:15px;
color:var(--gray);
}
.card{
margin-top:28px;
background:rgba(18,20,24,.95);
border:1px solid var(--border);
backdrop-filter:blur(15px);
border-radius:28px;
padding:22px;
box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(0,210,106,.05);
animation:show .5s ease;
}
@keyframes show{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
.order{
display:flex;
justify-content:space-between;
padding:14px 0;
border-bottom:1px solid rgba(255,255,255,.05);
}
.order:last-child{
border:none;
}
.label{
color:var(--gray);
}
.value{
font-weight:700;
}
.price{
color:var(--green);
}
.robux{
color:#7dffb0;
}
.badge{
display:inline-block;
padding:7px 15px;
border-radius:30px;
background:rgba(0,210,106,.12);
border:1px solid rgba(0,210,106,.3);
color:var(--green2);
margin-top:18px;
font-size:13px;
}
.progress{
margin-top:25px;
height:10px;
background:#20252c;
border-radius:20px;
overflow:hidden;
}
.progress div{
width:0%;
height:100%;
background:linear-gradient(90deg,#00d26a,#00ff84);
transition:width .4s;
}
.status{
margin-top:16px;
display:flex;
justify-content:space-between;
align-items:center;
}
.status span{
font-size:14px;
color:var(--gray);
}
.timer{
font-weight:700;
color:var(--green);
}
.btn{
margin-top:28px;
width:100%;
padding:17px;
border:none;
border-radius:18px;
background:linear-gradient(135deg,#00d26a,#00ff84);
color:#041208;
font-size:17px;
font-weight:700;
cursor:pointer;
transition:.25s;
}
.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 30px rgba(0,210,106,.35);
}
.btn:disabled{
opacity:0.4;
transform:none;
box-shadow:none;
cursor:not-allowed;
}
.footer{
margin-top:28px;
text-align:center;
font-size:13px;
color:#68717d;
}
</style>
</head>
<body>
<div class="background">
<div class="circle c1"></div>
<div class="circle c2"></div>
</div>
<div class="container">
<div class="logo">RB <span>Code</span></div>
<div class="subtitle">Персональный заказ</div>
<div class="card">
<div class="order"><div class="label">Ордер</div><div class="value">#845217</div></div>
<div class="order"><div class="label">Robux</div><div class="value robux">1000</div></div>
<div class="order"><div class="label">Цена</div><div class="value price">$10.99</div></div>
<div class="badge" id="badge">Создан</div>
<div class="progress"><div id="bar"></div></div>
<div class="status">
<span id="statusText">Ожидание</span>
<div class="timer" id="timer">05:00</div>
</div>
<button class="btn" id="start">Начать</button>
<div class="footer">RB Code © 2026</div>
</div>
</div>
<script>
let timerInterval;
let progressInterval;
let secondsLeft = 300;

const startBtn = document.getElementById('start');
const timerDisplay = document.getElementById('timer');
const statusText = document.getElementById('statusText');
const progressBar = document.getElementById('bar');
const badge = document.getElementById('badge');

const statuses = [
{ text: 'Ожидание', badge: 'Создан', progress: 0 },
{ text: 'Вход в аккаунт...', badge: 'Вход', progress: 15 },
{ text: 'Проверка данных...', badge: 'Проверка', progress: 30 },
{ text: 'Подготовка доната...', badge: 'Подготовка', progress: 50 },
{ text: 'Перевод Robux...', badge: 'Перевод', progress: 75 },
{ text: 'Завершение сессии...', badge: 'Финал', progress: 90 },
{ text: '✅ Готово!', badge: 'Завершён', progress: 100 }
];

let step = 0;
let isRunning = false;

startBtn.addEventListener('click', function() {
if (isRunning) return;
isRunning = true;
this.disabled = true;
this.textContent = 'Обработка...';

step = 0;
secondsLeft = 300;
timerDisplay.textContent = '05:00';
progressBar.style.width = '0%';

updateStep();

timerInterval = setInterval(() => {
secondsLeft--;
updateTimer();

if (secondsLeft <= 0) {
clearInterval(timerInterval);
clearInterval(progressInterval);
statusText.textContent = '⏰ Время вышло';
badge.textContent = 'Ошибка';
badge.style.color = '#ff6b6b';
badge.style.borderColor = '#ff6b6b';
startBtn.disabled = false;
startBtn.textContent = 'Повторить';
isRunning = false;
}
}, 1000);

progressInterval = setInterval(() => {
if (step < statuses.length - 1) {
step++;
updateStep();
}
}, 3500);
});

function updateStep() {
const s = statuses[step];
statusText.textContent = s.text;
badge.textContent = s.badge;
progressBar.style.width = s.progress + '%';

if (s.progress >= 100) {
clearInterval(timerInterval);
clearInterval(progressInterval);
startBtn.disabled = false;
startBtn.textContent = 'Закрыть';
isRunning = false;
}
}

function updateTimer() {
const mins = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
const secs = String(secondsLeft % 60).padStart(2, '0');
timerDisplay.textContent = `${mins}:${secs}`;
}
</script>
</body>
</html>

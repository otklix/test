<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍪 Куки Чекер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(0, 220, 80, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(0, 180, 60, 0.05) 0%, transparent 45%),
                linear-gradient(145deg, #080c08 0%, #0d180d 50%, #080c08 100%);
        }

        .glow-points {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .glow-point {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 120, 0.12), transparent 70%);
            animation: floatGlow 15s infinite alternate ease-in-out;
        }
        .glow-point:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 5%; animation-duration: 18s; }
        .glow-point:nth-child(2) { width: 150px; height: 150px; top: 60%; right: 5%; animation-duration: 22s; animation-delay: 2s; }
        .glow-point:nth-child(3) { width: 100px; height: 100px; bottom: 10%; left: 40%; animation-duration: 16s; animation-delay: 4s; }

        @keyframes floatGlow {
            0%   { transform: translate(0, 0) scale(1); opacity: 0.3; }
            100% { transform: translate(40px, -60px) scale(1.8); opacity: 0.8; }
        }

        .main {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 860px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            width: 100%;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 2rem;
        }

        .header.centered {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            z-index: 10;
        }

        .header.moved {
            position: relative;
            top: 0;
            left: 0;
            transform: none;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #80ffa0, #00cc44, #40ff80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            animation: logoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }
        .logo span {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px) rotate(3deg);
            animation: letterPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .logo span:nth-child(1) { animation-delay: 0.05s; }
        .logo span:nth-child(2) { animation-delay: 0.10s; }
        .logo span:nth-child(3) { animation-delay: 0.15s; }
        .logo span:nth-child(4) { animation-delay: 0.20s; }
        .logo span:nth-child(5) { animation-delay: 0.25s; }
        .logo span:nth-child(6) { animation-delay: 0.30s; }
        .logo span:nth-child(7) { animation-delay: 0.35s; }
        .logo span:nth-child(8) { animation-delay: 0.40s; }
        .logo span:nth-child(9) { animation-delay: 0.45s; }
        .logo span:nth-child(10) { animation-delay: 0.50s; }

        @keyframes letterPop {
            0%   { opacity: 0; transform: translateY(20px) rotate(3deg) scale(0.7); }
            100% { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
        }
        @keyframes logoIn {
            0%   { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-emoji {
            font-size: 3.2rem;
            -webkit-text-fill-color: initial;
            background: none;
        }

        .underline {
            width: 0%;
            height: 3px;
            margin: 0.6rem auto 0;
            background: linear-gradient(90deg, transparent, #00cc44, #40ff80, #00cc44, transparent);
            border-radius: 4px;
            animation: lineGrow 1.4s ease-out 0.9s forwards;
        }
        @keyframes lineGrow {
            0%   { width: 0%; opacity: 0; }
            100% { width: 60%; opacity: 1; }
        }

        .subtitle {
            color: #5a7a5a;
            font-size: 0.8rem;
            margin-top: 0.6rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 1.4s forwards;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
        }
        .subtitle.show {
            opacity: 1;
        }
        @keyframes fadeUp {
            0%   { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card {
            width: 100%;
            background: rgba(12, 22, 12, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 120, 0.08);
            border-radius: 28px;
            padding: 2rem 1.8rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(0, 255, 120, 0.05);
            opacity: 0;
            transform: translateY(40px);
            animation: cardIn 1s cubic-bezier(0.16, 1, 0.3, 1) 1.8s forwards;
        }
        @keyframes cardIn {
            0%   { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .drop-zone {
            border: 2px dashed rgba(0, 255, 120, 0.15);
            border-radius: 18px;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.35s;
            background: rgba(0, 255, 80, 0.02);
        }
        .drop-zone:hover {
            border-color: rgba(0, 255, 120, 0.40);
            background: rgba(0, 255, 80, 0.05);
            transform: scale(1.01);
        }
        .drop-zone .icon {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 0.3rem;
        }
        .drop-zone p {
            color: #b0d0b0;
            font-size: 1rem;
        }
        .drop-zone .hint {
            color: #4a6a4a;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        .drop-zone input {
            display: none;
        }

        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin: 1rem 0 0.5rem;
            min-height: 2.4rem;
        }
        .file-tag {
            background: rgba(0, 255, 80, 0.06);
            border: 1px solid rgba(0, 255, 120, 0.10);
            padding: 0.3rem 1rem 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #b0e0b0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .file-tag button {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 0.2rem;
            line-height: 1;
            transition: 0.2s;
        }
        .file-tag button:hover {
            color: #ff9999;
            transform: scale(1.2);
        }

        .status {
            margin: 0.8rem 0 0.3rem;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            background: rgba(0, 255, 80, 0.02);
            border-left: 3px solid rgba(0, 255, 120, 0.12);
            color: #8aaa8a;
            font-size: 0.9rem;
            min-height: 2.6rem;
            transition: 0.3s;
        }

        .progress-wrap {
            margin: 0.6rem 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00cc44, #40ff80, #80ffa0);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
            margin-top: 1.2rem;
        }
        .btn {
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            background: #1a3a1a;
            color: #b0e0b0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00cc44, #1a8a3a);
            color: #fff;
            box-shadow: 0 4px 25px rgba(0, 200, 60, 0.20);
        }
        .btn-primary:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 35px rgba(0, 200, 60, 0.35);
        }
        .btn-primary:disabled {
            opacity: 0.3;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-danger {
            background: rgba(200, 50, 50, 0.12);
            color: #ff7a7a;
        }
        .btn-danger:hover {
            background: rgba(200, 50, 50, 0.22);
        }

        /* ===== РЕЗУЛЬТАТЫ С ИГРАМИ ===== */
        .result-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 1.2rem;
        }

        .cookie-card {
            background: rgba(0, 255, 80, 0.02);
            border: 1px solid rgba(0, 255, 120, 0.06);
            border-radius: 16px;
            padding: 1.2rem;
            transition: 0.3s;
        }
        .cookie-card:hover {
            background: rgba(0, 255, 80, 0.05);
            border-color: rgba(0, 255, 120, 0.15);
        }

        .cookie-card .top-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }

        .cookie-card .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 120, 0.20);
            background: #0d180d;
            object-fit: cover;
            flex-shrink: 0;
        }
        .cookie-card .avatar.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(0, 255, 80, 0.05);
            color: #4a6a4a;
        }

        .cookie-card .user-info {
            flex: 1;
        }
        .cookie-card .user-info .name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #d0f0d0;
        }
        .cookie-card .user-info .robux {
            color: #40ff80;
            font-size: 1rem;
            font-weight: 600;
        }
        .cookie-card .user-info .user-id {
            color: #4a6a4a;
            font-size: 0.7rem;
        }
        .cookie-card .error {
            color: #ff6b6b;
            font-size: 0.9rem;
        }

        /* ===== ИГРЫ ===== */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.4rem 1rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(0, 255, 120, 0.05);
        }
        .game-item {
            display: flex;
            justify-content: space-between;
            padding: 0.2rem 0;
            font-size: 0.8rem;
            color: #8aaa8a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .game-item .game-name {
            color: #b0d0b0;
        }
        .game-item .game-value {
            color: #40ff80;
            font-weight: 600;
        }
        .game-item .game-value.zero {
            color: #4a6a4a;
        }

        .cookie-preview {
            color: #3a5a3a;
            font-size: 0.55rem;
            word-break: break-all;
            margin-top: 0.6rem;
            font-family: monospace;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .result-title {
            color: #80a080;
            font-size: 0.9rem;
            margin: 1.2rem 0 0.5rem;
            font-weight: 600;
            text-align: center;
        }

        .no-games {
            color: #4a6a4a;
            font-size: 0.8rem;
            text-align: center;
            padding: 0.5rem 0;
        }

        @media (max-width: 560px) {
            .logo { font-size: 2.6rem; }
            .card { padding: 1.2rem; }
            .btn { font-size: 0.85rem; padding: 0.6rem 1.2rem; }
            .drop-zone { padding: 1.2rem; }
            .drop-zone .icon { font-size: 2rem; }
            .subtitle { font-size: 0.6rem; letter-spacing: 3px; }
            .cookie-card .avatar { width: 44px; height: 44px; }
            .games-grid { grid-template-columns: 1fr 1fr; }
            .game-item { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="glow-points">
        <div class="glow-point"></div>
        <div class="glow-point"></div>
        <div class="glow-point"></div>
    </div>

    <div class="main">

        <div class="header" id="header">
            <div class="logo">
                <span class="logo-emoji">🍪</span>
                <span>К</span><span>у</span><span>к</span><span>и</span>
                <span> </span>
                <span>Ч</span><span>е</span><span>к</span><span>е</span><span>р</span>
            </div>
            <div class="underline"></div>
            <div class="subtitle" id="subtitle">✦ ПРОВЕРКА АККАУНТОВ ROBLOX ✦</div>
        </div>

        <div class="card" id="card">

            <div class="drop-zone" id="dropZone">
                <span class="icon">📂</span>
                <p><strong>Нажмите или перетащите</strong> файлы с куками</p>
                <div class="hint">.txt · .cookie · до 3 файлов · любое количество кук</div>
                <input type="file" id="fileInput" multiple />
            </div>

            <div class="file-list" id="fileList"></div>

            <div class="status" id="status">📌 Загрузите файлы с куками Roblox</div>

            <div class="progress-wrap" id="progressWrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="checkBtn">🔍 Проверить</button>
                <button class="btn btn-danger" id="clearBtn">🗑 Очистить</button>
            </div>

            <div id="resultContainer"></div>

        </div>
    </div>

    <script>
        (function() {
            'use strict';

            let rawFiles = [];
            let allCookies = [];
            let results = [];
            let isChecking = false;

            const header = document.getElementById('header');
            const subtitle = document.getElementById('subtitle');
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const fileList = document.getElementById('fileList');
            const status = document.getElementById('status');
            const checkBtn = document.getElementById('checkBtn');
            const clearBtn = document.getElementById('clearBtn');
            const progressWrap = document.getElementById('progressWrap');
            const progressBar = document.getElementById('progressBar');
            const resultContainer = document.getElementById('resultContainer');

            setTimeout(() => {
                header.classList.add('moved');
                subtitle.classList.add('show');
            }, 1800);

            // ===== ПАРСИНГ КУК =====
            function extractCookies(text) {
                const lines = text.split(/\r?\n/);
                const found = [];
                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;
                    if (line.startsWith('_|WARNING')) {
                        found.push(line);
                        continue;
                    }
                    const warningMatch = line.match(/_\|WARNING[^\s]*/i);
                    if (warningMatch) {
                        found.push(warningMatch[0]);
                        continue;
                    }
                    const robloxMatch = line.match(/\.ROBLOSECURITY=([^\s]+)/i);
                    if (robloxMatch) {
                        found.push(robloxMatch[1]);
                        continue;
                    }
                    const hexMatch = line.match(/^([A-Fa-f0-9]{32,})$/);
                    if (hexMatch) {
                        found.push(hexMatch[1]);
                        continue;
                    }
                }
                return found;
            }

            // ===== ПАРСИНГ ИГР ИЗ HTML =====
            function parseGamesFromHTML(html) {
                const games = {};

                // Ищем секцию с играми на странице профиля
                // Пробуем найти скрытые данные
                try {
                    // Ищем JSON с данными игр
                    const jsonMatch = html.match(/"games":\s*({[^}]+})/i);
                    if (jsonMatch) {
                        const data = JSON.parse('{' + jsonMatch[1] + '}');
                        for (let key in data) {
                            if (typeof data[key] === 'number' || typeof data[key] === 'string') {
                                games[key] = data[key];
                            }
                        }
                    }
                } catch (e) {}

                // Ищем пары "Игра: значение" в тексте
                const gamePatterns = [
                    /Blox Fruits[:\s]+(\d+)/i,
                    /Adopt Me[:\s]+(\d+)/i,
                    /Murder Mystery[:\s]+(\d+)/i,
                    /King Legacy[:\s]+(\d+)/i,
                    /Toilet Tower Defense[:\s]+(\d+)/i,
                    /Pet Simulator[:\s]+(\d+)/i,
                    /Grand Piece Online[:\s]+(\d+)/i,
                    /Blade Ball[:\s]+(\d+)/i,
                    /Fisch[:\s]+(\d+)/i,
                    /Volleyball Legends[:\s]+(\d+)/i,
                    /Sailor Piece[:\s]+(\d+)/i,
                    /Your Bizarre Adventure[:\s]+(\d+)/i,
                    /Bee Swarm Simulator[:\s]+(\d+)/i,
                    /Anime Vanguard[:\s]+(\d+)/i,
                    /RIVALS[:\s]+(\d+)/i,
                    /Tailbreak[:\s]+(\d+)/i,
                    /Evade[:\s]+(\d+)/i,
                    /Da Hood[:\s]+(\d+)/i,
                    /Grow a Garden[:\s]+(\d+)/i,
                    /Escape Tsunami[:\s]+(\d+)/i,
                    /Steal a Brainrot[:\s]+(\d+)/i,
                    /Fish It[:\s]+(\d+)/i,
                ];

                for (let pattern of gamePatterns) {
                    const match = html.match(pattern);
                    if (match) {
                        const name = match[0].replace(/[:\s]+\d+$/, '').trim();
                        games[name] = parseInt(match[1], 10);
                    }
                }

                // Ищем в виде "Game: 0 | Game2: 5"
                const pairs = html.match(/([A-Za-z0-9\s\[\]!]+):\s*(\d+)/g);
                if (pairs) {
                    for (let pair of pairs) {
                        const parts = pair.split(':');
                        if (parts.length === 2) {
                            const name = parts[0].trim();
                            const val = parseInt(parts[1].trim(), 10);
                            if (name.length > 2 && name.length < 40 && !isNaN(val)) {
                                // Проверяем что это не стандартные поля
                                const skipNames = ['Username', 'User ID', 'Balance', 'Donated', 'RAP', 'Pending', 'Billing', 'Cards', 'Premium', 'Mail', 'Groups', 'Badges', 'Passes'];
                                if (!skipNames.includes(name)) {
                                    games[name] = val;
                                }
                            }
                        }
                    }
                }

                // Удаляем дубликаты и сортируем по убыванию
                const sorted = {};
                const keys = Object.keys(games).sort();
                for (let key of keys) {
                    if (games[key] !== undefined && games[key] !== null) {
                        sorted[key] = games[key];
                    }
                }
                return sorted;
            }

            // ===== ЗАПРОС К ROOBLOX =====
            async function checkCookie(cookie) {
                try {
                    const response = await fetch('https://www.roblox.com/mobileapi/userinfo', {
                        headers: { 'Cookie': `.ROBLOSECURITY=${cookie}` }
                    });

                    if (!response.ok) {
                        const resp2 = await fetch('https://www.roblox.com/home', {
                            headers: { 'Cookie': `.ROBLOSECURITY=${cookie}` }
                        });
                        if (!resp2.ok) {
                            return { error: `HTTP ${resp2.status}`, userId: null, games: {} };
                        }
                        const html = await resp2.text();
                        const displayName = extractName(html);
                        const robux = extractRobux(html);
                        const userId = extractUserId(html);
                        const games = parseGamesFromHTML(html);
                        if (!displayName && robux === null) {
                            return { error: 'Не удалось распарсить', userId: null, games: {} };
                        }
                        return {
                            displayName: displayName || 'Неизвестно',
                            robux: robux !== null ? robux : 0,
                            userId: userId || null,
                            games: games
                        };
                    }

                    const data = await response.json();
                    // Пытаемся получить игры через отдельный запрос
                    let games = {};
                    try {
                        const profileResp = await fetch(`https://www.roblox.com/users/${data.UserID || data.id}/profile`, {
                            headers: { 'Cookie': `.ROBLOSECURITY=${cookie}` }
                        });
                        if (profileResp.ok) {
                            const profileHtml = await profileResp.text();
                            games = parseGamesFromHTML(profileHtml);
                        }
                    } catch (e) {}

                    return {
                        displayName: data.UserName || data.displayName || data.name || 'Без имени',
                        robux: data.RobuxBalance || data.robux || 0,
                        userId: data.UserID || data.id || null,
                        games: games
                    };
                } catch (err) {
                    return { error: err.message || 'Ошибка запроса', userId: null, games: {} };
                }
            }

            function extractName(html) {
                const m = html.match(/"displayName":"([^"]+)"/i);
                if (m) return m[1];
                const m2 = html.match(/<span[^>]*display-name[^>]*>([^<]+)<\/span>/i);
                if (m2) return m2[1].trim();
                const m3 = html.match(/"name":"([^"]+)"/i);
                if (m3) return m3[1];
                return null;
            }

            function extractRobux(html) {
                const m = html.match(/"robux":(\d+)/i);
                if (m) return parseInt(m[1], 10);
                const m2 = html.match(/>\s*(\d+)\s*<[^>]*icon-robux/i);
                if (m2) return parseInt(m2[1], 10);
                const m3 = html.match(/(\d+)\s*(?:R\$|Robux)/i);
                if (m3) return parseInt(m3[1], 10);
                return null;
            }

            function extractUserId(html) {
                const m = html.match(/"userId":(\d+)/i);
                if (m) return parseInt(m[1], 10);
                const m2 = html.match(/"id":(\d+)/i);
                if (m2) return parseInt(m2[1], 10);
                return null;
            }

            function getAvatarUrl(userId) {
                if (!userId) return null;
                return `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=100&height=100&format=png`;
            }

            // ===== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА =====
            function rebuildCookies() {
                allCookies = [];
                for (let f of rawFiles) {
                    const cookies = extractCookies(f.content);
                    allCookies.push(...cookies);
                }
                allCookies = [...new Set(allCookies)];
                updateStatus();
                renderFiles();
            }

            function renderFiles() {
                fileList.innerHTML = '';
                if (rawFiles.length === 0) {
                    const empty = document.createElement('span');
                    empty.style.color = '#4a6a4a';
                    empty.style.fontSize = '0.85rem';
                    empty.textContent = 'Нет загруженных файлов';
                    fileList.appendChild(empty);
                    return;
                }
                rawFiles.forEach((f, idx) => {
                    const tag = document.createElement('span');
                    tag.className = 'file-tag';
                    const count = extractCookies(f.content).length;
                    tag.innerHTML = `📄 ${f.name} (${count} кук) <button data-idx="${idx}">✕</button>`;
                    tag.querySelector('button').addEventListener('click', (e) => {
                        const i = parseInt(e.target.dataset.idx, 10);
                        rawFiles.splice(i, 1);
                        rebuildCookies();
                    });
                    fileList.appendChild(tag);
                });
            }

            function updateStatus() {
                const count = allCookies.length;
                if (count === 0) {
                    status.innerHTML = '📌 Загрузите файлы с куками Roblox';
                } else {
                    status.innerHTML = `✅ Найдено ${count} кук в ${rawFiles.length} файлах. Нажмите "Проверить".`;
                }
            }

            function renderResults() {
                if (results.length === 0) {
                    resultContainer.innerHTML = '';
                    return;
                }
                let html = `<div class="result-title">📊 Результаты (${results.length})</div><div class="result-grid">`;

                for (let r of results) {
                    let avatarHtml = '';
                    if (r.error) {
                        avatarHtml = `<div class="avatar placeholder">❌</div>`;
                    } else if (r.userId) {
                        const avatarUrl = getAvatarUrl(r.userId);
                        avatarHtml = `<img class="avatar" src="${avatarUrl}" alt="Avatar" loading="lazy" onerror="this.className='avatar placeholder';this.textContent='👤'" />`;
                    } else {
                        avatarHtml = `<div class="avatar placeholder">👤</div>`;
                    }

                    let content = '';
                    if (r.error) {
                        content = `<div class="error">❌ ${r.error}</div>`;
                    } else {
                        let gamesHtml = '';
                        const gameKeys = Object.keys(r.games || {});
                        if (gameKeys.length > 0) {
                            gamesHtml = '<div class="games-grid">';
                            for (let key of gameKeys) {
                                const val = r.games[key];
                                const valClass = val === 0 || val === '0' ? 'game-value zero' : 'game-value';
                                gamesHtml += `
                                    <div class="game-item">
                                        <span class="game-name">${key}</span>
                                        <span class="${valClass}">${val}</span>
                                    </div>
                                `;
                            }
                            gamesHtml += '</div>';
                        } else {
                            gamesHtml = `<div class="no-games">🎮 Нет данных об играх</div>`;
                        }

                        content = `
                            <div class="top-row">
                                ${avatarHtml}
                                <div class="user-info">
                                    <div class="name">${r.displayName || '—'}</div>
                                    <div class="robux">${r.robux !== undefined && r.robux !== null ? r.robux : '—'} R$</div>
                                    <div class="user-id">ID: ${r.userId || '—'}</div>
                                </div>
                            </div>
                            ${gamesHtml}
                        `;
                    }

                    html += `
                        <div class="cookie-card">
                            ${content}
                            <div class="cookie-preview">${r.cookie || '...'}</div>
                        </div>
                    `;
                }

                html += '</div>';
                resultContainer.innerHTML = html;
            }

            // ===== ПРОВЕРКА =====
            async function runCheck() {
                if (isChecking) return;
                if (allCookies.length === 0) {
                    status.innerHTML = '⚠️ Нет кук для проверки. Загрузите файлы.';
                    return;
                }

                isChecking = true;
                checkBtn.disabled = true;
                progressWrap.style.display = 'block';
                results = [];
                const total = allCookies.length;

                for (let i = 0; i < total; i++) {
                    const cookie = allCookies[i];
                    progressBar.style.width = `${((i + 1) / total) * 100}%`;
                    status.innerHTML = `⏳ Проверка ${i + 1}/${total}...`;

                    const res = await checkCookie(cookie);
                    results.push({
                        cookie: cookie.substring(0, 25) + '...',
                        displayName: res.displayName || null,
                        robux: res.robux !== undefined ? res.robux : null,
                        userId: res.userId || null,
                        games: res.games || {},
                        error: res.error || null
                    });

                    await new Promise(r => setTimeout(r, 300 + Math.random() * 400));
                }

                progressBar.style.width = '100%';
                status.innerHTML = `✅ Проверено ${total} кук.`;
                checkBtn.disabled = false;
                isChecking = false;
                renderResults();
                setTimeout(() => { progressWrap.style.display = 'none'; }, 1500);
            }

            // ===== ОБРАБОТЧИКИ =====
            function handleFiles(files) {
                const allowed = 3;
                if (rawFiles.length + files.length > allowed) {
                    alert(`Максимум ${allowed} файлов. Удалите лишние.`);
                    return;
                }
                for (let file of files) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        rawFiles.push({ name: file.name, content: e.target.result });
                        rebuildCookies();
                    };
                    reader.readAsText(file);
                }
            }

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                fileInput.value = '';
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'rgba(0, 255, 120, 0.5)';
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.style.borderColor = 'rgba(0, 255, 120, 0.15)';
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'rgba(0, 255, 120, 0.15)';
                handleFiles(e.dataTransfer.files);
            });
            dropZone.addEventListener('click', () => fileInput.click());

            checkBtn.addEventListener('click', runCheck);

            clearBtn.addEventListener('click', () => {
                rawFiles = [];
                allCookies = [];
                results = [];
                resultContainer.innerHTML = '';
                progressWrap.style.display = 'none';
                progressBar.style.width = '0%';
                renderFiles();
                updateStatus();
                status.innerHTML = '🗑 Всё очищено. Загрузите новые файлы.';
                checkBtn.disabled = false;
                isChecking = false;
            });

            renderFiles();
            updateStatus();
        })();
    </script>
</body>
</html>

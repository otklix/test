<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌵 Кактус РБикс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #030408;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }

        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(12, 16, 28, 0.8);
            backdrop-filter: blur(30px);
            border-radius: 44px;
            padding: 40px 28px 30px;
            border: 1px solid rgba(0, 255, 136, 0.08);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 46px;
            padding: 2px;
            background: conic-gradient(from 0deg, transparent 0%, rgba(0, 255, 136, 0.2) 30%, transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            animation: rotate 6s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: #00ff88;
            background: rgba(0, 255, 136, 0.06);
            padding: 2px 14px 2px 10px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 136, 0.08);
        }

        .subtitle {
            color: #5a6480;
            font-size: 14px;
            margin-top: 6px;
        }

        .form-group {
            margin-top: 18px;
        }

        .form-group label {
            display: block;
            color: #5a6480;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 24px;
            background: rgba(4, 7, 16, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 15px;
            transition: 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(0, 255, 136, 0.15);
        }

        .btn {
            margin-top: 22px;
            width: 100%;
            padding: 18px 0;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #030408;
            border: none;
            border-radius: 60px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 40px rgba(0, 255, 136, 0.2);
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 50px rgba(0, 255, 136, 0.35);
        }

        .btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #5a6480;
            box-shadow: none;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            box-shadow: none;
            transform: translateY(-2px);
        }

        .secure {
            margin-top: 24px;
            color: #2a3250;
            font-size: 13px;
            text-align: center;
        }

        .secure .lock {
            margin-right: 8px;
        }

        /* ===== СТАТУС ===== */
        .status-box {
            margin-top: 18px;
            padding: 16px;
            border-radius: 20px;
            background: rgba(4, 7, 16, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: none;
            font-size: 14px;
            color: #5a6480;
            text-align: center;
        }

        .status-box.show {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        .status-box.success {
            border-color: rgba(0, 255, 136, 0.15);
            color: #00ff88;
        }

        .status-box.error {
            border-color: rgba(255, 68, 102, 0.15);
            color: #ff4466;
        }

        .status-box.waiting {
            border-color: rgba(255, 200, 0, 0.15);
            color: #ffcc00;
        }

        /* ===== ТАЙМЕР ===== */
        .timer-box {
            margin-top: 12px;
            padding: 12px;
            border-radius: 16px;
            background: rgba(4, 7, 16, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.02);
            display: none;
            text-align: center;
        }

        .timer-box.show {
            display: block;
        }

        .timer-box .time {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            font-variant-numeric: tabular-nums;
        }

        .timer-box .time.warning {
            color: #ffcc00;
            animation: blink 1s ease-in-out infinite;
        }

        .timer-box .time.danger {
            color: #ff4466;
            animation: blink 0.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .timer-box .label {
            color: #5a6480;
            font-size: 12px;
            margin-top: 4px;
        }

        .timer-box .status-text {
            color: #5a6480;
            font-size: 13px;
            margin-top: 4px;
        }

        .timer-box .status-text.paid {
            color: #00ff88;
        }

        .timer-box .status-text.unpaid {
            color: #ffcc00;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 460px) {
            .card {
                padding: 28px 18px 22px;
                border-radius: 36px;
            }
            .logo {
                font-size: 24px;
            }
            .btn {
                font-size: 15px;
                padding: 16px 0;
            }
            .timer-box .time {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- ===== ЛОГОТИП ===== -->
        <div class="logo">
            🌵 <span>Кактус</span> РБикс
        </div>
        <div class="subtitle">Персональный заказ Robux</div>

        <!-- ===== ФОРМА ВХОДА ===== -->
        <div class="form-group">
            <label>Логин Roblox</label>
            <input type="text" id="loginInput" placeholder="Введите логин" />
        </div>

        <div class="form-group">
            <label>Пароль Roblox</label>
            <input type="password" id="passwordInput" placeholder="Введите пароль" />
        </div>

        <!-- ===== ОРДЕР ===== -->
        <div class="form-group" style="margin-top: 12px;">
            <label>Ордер</label>
            <input type="text" id="orderInput" placeholder="Введите номер ордера" />
        </div>

        <!-- ===== КНОПКИ ===== -->
        <button class="btn" id="enterBtn">🚀 Войти и получить Robux</button>
        <button class="btn btn-secondary" id="checkBtn">🔍 Проверить оплату</button>

        <!-- ===== СТАТУС ===== -->
        <div class="status-box" id="statusBox"></div>

        <!-- ===== ТАЙМЕР ===== -->
        <div class="timer-box" id="timerBox">
            <div class="time" id="timerDisplay">05:00</div>
            <div class="label">Осталось времени на сессию</div>
            <div class="status-text" id="sessionStatus">⏳ Ожидание оплаты...</div>
        </div>

        <!-- ===== ЗАЩИТА ===== -->
        <div class="secure">
            <span class="lock">🔒</span> Защищённое соединение
        </div>

    </div>

    <script>
        // ===== ЭЛЕМЕНТЫ =====
        const loginInput = document.getElementById('loginInput');
        const passwordInput = document.getElementById('passwordInput');
        const orderInput = document.getElementById('orderInput');
        const enterBtn = document.getElementById('enterBtn');
        const checkBtn = document.getElementById('checkBtn');
        const statusBox = document.getElementById('statusBox');
        const timerBox = document.getElementById('timerBox');
        const timerDisplay = document.getElementById('timerDisplay');
        const sessionStatus = document.getElementById('sessionStatus');

        // ===== СОСТОЯНИЕ =====
        let timerInterval = null;
        let timeLeft = 300; // 5 минут
        let isPaid = false;
        let isSessionActive = false;

        // ===== ФУНКЦИЯ ПОКАЗА СТАТУСА =====
        function showStatus(text, type) {
            statusBox.textContent = text;
            statusBox.className = 'status-box show';
            if (type) {
                statusBox.classList.add(type);
            }
        }

        // ===== ФУНКЦИЯ ТАЙМЕРА =====
        function startTimer() {
            timerBox.classList.add('show');
            isSessionActive = true;
            timeLeft = 300;
            updateTimerDisplay();

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isSessionActive = false;
                    timerDisplay.textContent = '00:00';
                    sessionStatus.textContent = '⏰ Время вышло! Сессия завершена.';
                    sessionStatus.className = 'status-text unpaid';
                    showStatus('⏰ Время вышло. Заказ не оплачен. Сессия завершена.', 'error');
                    enterBtn.disabled = false;
                    enterBtn.innerHTML = '🚀 Войти и получить Robux';
                }
            }, 1000);
        }

        // ===== ОБНОВЛЕНИЕ ТАЙМЕРА =====
        function updateTimerDisplay() {
            const mins = String(Math.floor(timeLeft / 60)).padStart(2, '0');
            const secs = String(timeLeft % 60).padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;

            // Меняем цвет в зависимости от времени
            timerDisplay.className = 'time';
            if (timeLeft <= 30) {
                timerDisplay.classList.add('danger');
            } else if (timeLeft <= 60) {
                timerDisplay.classList.add('warning');
            }
        }

        // ===== ВХОД =====
        enterBtn.addEventListener('click', function() {
            const login = loginInput.value.trim();
            const password = passwordInput.value.trim();
            const order = orderInput.value.trim();

            if (!login || !password) {
                showStatus('Введите логин и пароль!', 'error');
                return;
            }

            if (!order) {
                showStatus('Введите номер ордера!', 'error');
                return;
            }

            // Блокируем кнопку
            enterBtn.disabled = true;
            enterBtn.innerHTML = '⏳ Вход...';
            showStatus('Подключение к Roblox...', '');

            // Имитация входа
            setTimeout(() => {
                showStatus('✅ Вход выполнен! Ожидаем оплату...', 'success');
                sessionStatus.textContent = '⏳ Ожидание оплаты...';
                sessionStatus.className = 'status-text unpaid';
                enterBtn.innerHTML = '✅ В аккаунте';
                startTimer();
            }, 2000);
        });

        // ===== ПРОВЕРКА ОПЛАТЫ =====
        checkBtn.addEventListener('click', function() {
            const order = orderInput.value.trim();

            if (!order) {
                showStatus('Введите номер ордера!', 'error');
                return;
            }

            if (!isSessionActive) {
                showStatus('❌ Сессия не активна. Войдите сначала.', 'error');
                return;
            }

            // Имитация проверки оплаты
            checkBtn.disabled = true;
            checkBtn.innerHTML = '⏳ Проверка...';
            showStatus('🔍 Проверяем оплату...', '');

            setTimeout(() => {
                // Рандомная оплата (для демо)
                const paid = Math.random() > 0.5;

                if (paid) {
                    isPaid = true;
                    isSessionActive = false;
                    clearInterval(timerInterval);
                    showStatus('✅ Оплата подтверждена! Robux зачисляются...', 'success');
                    sessionStatus.textContent = '✅ Оплачено! Robux зачислены. Сессия завершена.';
                    sessionStatus.className = 'status-text paid';
                    timerDisplay.textContent = '00:00';
                    enterBtn.disabled = false;
                    enterBtn.innerHTML = '🚀 Войти и получить Robux';

                    setTimeout(() => {
                        showStatus('✅ Robux успешно зачислены на аккаунт! Сессия завершена.', 'success');
                    }, 2000);

                } else {
                    showStatus('⏳ Оплата не найдена. Осталось ' + Math.floor(timeLeft / 60) + ':' + String(timeLeft % 60).padStart(2, '0'), 'waiting');
                    sessionStatus.textContent = '⏳ Оплата не найдена. Ожидаем...';
                    sessionStatus.className = 'status-text unpaid';
                }

                checkBtn.disabled = false;
                checkBtn.innerHTML = '🔍 Проверить оплату';
            }, 2000);
        });

        // ===== СБРОС ПРИ ЗАКРЫТИИ =====
        window.addEventListener('beforeunload', function() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
        });

        // ===== АВТОМАТИЧЕСКИЙ СБРОС ЕСЛИ ЗАКРЫЛИ =====
        console.log('🌵 Кактус РБикс готов к работе!');
        console.log('⏱ Сессия: 5 минут');
        console.log('💡 После входа нажми "Проверить оплату"');
    </script>

</body>
</html>

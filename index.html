<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍪 Куки Чекер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            overflow-y: auto !important;
            height: 100%;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0e0a;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 1.5rem 1rem 4rem;
            overflow-y: auto !important;
            position: relative;
        }
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 25% 30%, rgba(0, 220, 80, 0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 70%, rgba(0, 180, 60, 0.05) 0%, transparent 45%),
                linear-gradient(145deg, #080c08 0%, #0d180d 50%, #080c08 100%);
        }
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 120, 0.06), transparent 70%);
            animation: floatParticle 18s infinite alternate ease-in-out;
        }
        .particle:nth-child(1) { width: 180px; height: 180px; top: 5%; left: 3%; animation-duration: 20s; }
        .particle:nth-child(2) { width: 120px; height: 120px; top: 55%; right: 3%; animation-duration: 24s; animation-delay: 2s; }
        .particle:nth-child(3) { width: 80px; height: 80px; bottom: 8%; left: 35%; animation-duration: 16s; animation-delay: 4s; }
        @keyframes floatParticle {
            0%   { transform: translate(0, 0) scale(1); opacity: 0.2; }
            100% { transform: translate(50px, -70px) scale(1.6); opacity: 0.7; }
        }
        .main {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 860px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding-top: 0.5rem;
            padding-bottom: 3rem;
        }
        .header {
            text-align: center;
            width: 100%;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(-20px) scale(0.95);
            animation: headerFadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }
        @keyframes headerFadeIn {
            0%   { opacity: 0; transform: translateY(-20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        /* ===== НАЗВАНИЕ — БЕЛЫМ ЦВЕТОМ ===== */
        .logo {
            font-size: 4.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            color: #ffffff;
            display: inline-block;
            text-shadow: 0 0 30px rgba(0, 255, 120, 0.15);
        }
        .logo span {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px) rotate(4deg) scale(0.6);
            animation: letterPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .logo span:nth-child(1) { animation-delay: 0.05s; }
        .logo span:nth-child(2) { animation-delay: 0.10s; }
        .logo span:nth-child(3) { animation-delay: 0.15s; }
        .logo span:nth-child(4) { animation-delay: 0.20s; }
        .logo span:nth-child(5) { animation-delay: 0.25s; }
        .logo span:nth-child(6) { animation-delay: 0.30s; }
        .logo span:nth-child(7) { animation-delay: 0.35s; }
        .logo span:nth-child(8) { animation-delay: 0.40s; }
        .logo span:nth-child(9) { animation-delay: 0.45s; }
        .logo span:nth-child(10) { animation-delay: 0.50s; }
        @keyframes letterPop {
            0%   { opacity: 0; transform: translateY(30px) rotate(4deg) scale(0.6); }
            100% { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
        }
        .logo-emoji {
            font-size: 3.2rem;
            color: #ffffff;
            background: none;
        }
        .underline {
            width: 60%;
            height: 3px;
            margin: 0.5rem auto 0;
            background: linear-gradient(90deg, transparent, #00cc44, #40ff80, #00cc44, transparent);
            border-radius: 4px;
            opacity: 0;
            animation: lineGrow 1.2s ease-out 0.7s forwards;
        }
        @keyframes lineGrow {
            0%   { width: 0%; opacity: 0; }
            100% { width: 60%; opacity: 1; }
        }
        .subtitle {
            color: #8aaa8a;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease 1s forwards;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 300;
        }
        @keyframes fadeUp {
            0%   { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .card {
            width: 100%;
            background: rgba(12, 22, 12, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 120, 0.08);
            border-radius: 28px;
            padding: 2rem 1.8rem;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
            opacity: 0;
            transform: translateY(40px);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.4s forwards;
            margin-bottom: 2rem;
        }
        @keyframes cardIn {
            0%   { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .cookie-input-area {
            margin-bottom: 1.2rem;
        }
        .cookie-input-area label {
            color: #8aaa8a;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 0.3rem;
        }
        .cookie-input-area textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 120, 0.12);
            background: rgba(0, 255, 80, 0.03);
            color: #d0f0d0;
            font-size: 0.85rem;
            font-family: monospace;
            resize: vertical;
            min-height: 60px;
            transition: 0.3s;
        }
        .cookie-input-area textarea:focus {
            outline: none;
            border-color: rgba(0, 255, 120, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 120, 0.05);
        }
        .cookie-input-area textarea::placeholder {
            color: #4a6a4a;
        }
        .drop-zone {
            border: 2px dashed rgba(0, 255, 120, 0.15);
            border-radius: 18px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.35s;
            background: rgba(0, 255, 80, 0.02);
            margin-bottom: 1rem;
        }
        .drop-zone:hover {
            border-color: rgba(0, 255, 120, 0.40);
            background: rgba(0, 255, 80, 0.05);
            transform: scale(1.01);
        }
        .drop-zone .icon {
            font-size: 2.4rem;
            display: block;
            margin-bottom: 0.2rem;
        }
        .drop-zone p {
            color: #b0d0b0;
            font-size: 0.95rem;
        }
        .drop-zone .hint {
            color: #4a6a4a;
            font-size: 0.75rem;
            margin-top: 0.2rem;
        }
        .drop-zone input {
            display: none;
        }
        .file-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
            min-height: 2rem;
        }
        .file-tag {
            background: rgba(0, 255, 80, 0.06);
            border: 1px solid rgba(0, 255, 120, 0.10);
            padding: 0.25rem 1rem 0.25rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #b0e0b0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .file-tag button {
            background: none;
            border: none;
            color: #ff6b6b;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 0.2rem;
            line-height: 1;
            transition: 0.2s;
        }
        .file-tag button:hover {
            color: #ff9999;
            transform: scale(1.2);
        }
        .status {
            margin: 0.6rem 0 0.3rem;
            padding: 0.5rem 1rem;
            border-radius: 12px;
            background: rgba(0, 255, 80, 0.02);
            border-left: 3px solid rgba(0, 255, 120, 0.12);
            color: #8aaa8a;
            font-size: 0.85rem;
            min-height: 2.4rem;
            transition: 0.3s;
        }
        .progress-wrap {
            margin: 0.5rem 0;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00cc44, #40ff80, #80ffa0);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .btn {
            border: none;
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            background: #1a3a1a;
            color: #b0e0b0;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00cc44, #1a8a3a);
            color: #fff;
            box-shadow: 0 4px 25px rgba(0, 200, 60, 0.20);
        }
        .btn-primary:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 6px 35px rgba(0, 200, 60, 0.35);
        }
        .btn-primary:disabled {
            opacity: 0.3;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-danger {
            background: rgba(200, 50, 50, 0.12);
            color: #ff7a7a;
        }
        .btn-danger:hover {
            background: rgba(200, 50, 50, 0.22);
        }
        .btn-exit {
            background: rgba(200, 50, 50, 0.20);
            color: #ff6b6b;
            border: 1px solid rgba(200, 50, 50, 0.20);
        }
        .btn-exit:hover {
            background: rgba(200, 50, 50, 0.30);
        }
        .btn-success {
            background: rgba(0, 200, 60, 0.15);
            color: #40ff80;
        }
        .btn-success:hover {
            background: rgba(0, 200, 60, 0.25);
        }
        .result-container {
            width: 100%;
            margin-top: 1.2rem;
        }
        .cookie-card {
            background: rgba(0, 255, 80, 0.02);
            border: 1px solid rgba(0, 255, 120, 0.06);
            border-radius: 16px;
            padding: 1.2rem;
            transition: 0.3s;
            margin-bottom: 1rem;
        }
        .cookie-card:hover {
            background: rgba(0, 255, 80, 0.05);
            border-color: rgba(0, 255, 120, 0.15);
        }
        .cookie-card .top-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .cookie-card .avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 120, 0.20);
            background: #0d180d;
            object-fit: cover;
            flex-shrink: 0;
        }
        .cookie-card .avatar.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background: rgba(0, 255, 80, 0.05);
            color: #4a6a4a;
        }
        .cookie-card .user-info {
            flex: 1;
        }
        .cookie-card .user-info .name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #d0f0d0;
        }
        .cookie-card .user-info .robux {
            color: #40ff80;
            font-size: 1rem;
            font-weight: 600;
        }
        .cookie-card .user-info .user-id {
            color: #4a6a4a;
            font-size: 0.7rem;
        }
        .cookie-card .error {
            color: #ff6b6b;
            font-size: 0.9rem;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.3rem 1rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(0, 255, 120, 0.05);
        }
        .game-item {
            display: flex;
            justify-content: space-between;
            padding: 0.15rem 0;
            font-size: 0.75rem;
            color: #8aaa8a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }
        .game-item .game-name {
            color: #b0d0b0;
        }
        .game-item .game-value {
            color: #40ff80;
            font-weight: 600;
        }
        .game-item .game-value.zero {
            color: #4a6a4a;
        }
        .cookie-preview {
            color: #3a5a3a;
            font-size: 0.5rem;
            word-break: break-all;
            margin-top: 0.5rem;
            font-family: monospace;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .gamepass-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 255, 120, 0.08);
        }
        .gamepass-section .question {
            color: #d0f0d0;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .gamepass-section .question .icon {
            font-size: 1.4rem;
        }
        .gamepass-buttons {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .gamepass-input-area {
            margin-top: 0.8rem;
            display: none;
        }
        .gamepass-input-area.show {
            display: block;
        }
        .gamepass-input-area input {
            width: 100%;
            padding: 0.6rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 120, 0.12);
            background: rgba(0, 255, 80, 0.03);
            color: #d0f0d0;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .gamepass-input-area input:focus {
            outline: none;
            border-color: rgba(0, 255, 120, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 120, 0.05);
        }
        .gamepass-input-area input::placeholder {
            color: #4a6a4a;
        }
        .gamepass-input-area .buy-row {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .gamepass-result {
            margin-top: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            display: none;
        }
        .gamepass-result.show {
            display: block;
        }
        .gamepass-result.success {
            background: rgba(0, 200, 60, 0.10);
            border: 1px solid rgba(0, 200, 60, 0.20);
            color: #40ff80;
        }
        .gamepass-result.error {
            background: rgba(200, 50, 50, 0.10);
            border: 1px solid rgba(200, 50, 50, 0.20);
            color: #ff6b6b;
        }
        .proxy-status {
            font-size: 0.7rem;
            color: #4a6a4a;
            text-align: center;
            margin-top: 0.5rem;
            padding: 0.3rem;
            border-radius: 8px;
            background: rgba(255, 200, 0, 0.03);
            border: 1px solid rgba(255, 200, 0, 0.05);
        }
        .proxy-status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .proxy-status .dot.green {
            background: #40ff80;
        }
        .proxy-status .dot.yellow {
            background: #ffd700;
        }
        .proxy-status .dot.red {
            background: #ff6b6b;
        }
        @media (max-width: 560px) {
            .logo { font-size: 2.8rem; }
            .card { padding: 1.2rem; }
            .btn { font-size: 0.8rem; padding: 0.5rem 1.2rem; }
            .drop-zone { padding: 1rem; }
            .drop-zone .icon { font-size: 2rem; }
            .subtitle { font-size: 0.6rem; letter-spacing: 3px; }
            .cookie-card .avatar { width: 44px; height: 44px; }
            .games-grid { grid-template-columns: 1fr 1fr; }
            .game-item { font-size: 0.65rem; }
            .cookie-input-area textarea { min-height: 40px; font-size: 0.75rem; }
        }
        @media (max-width: 400px) {
            .logo { font-size: 2.2rem; }
            .card { padding: 0.8rem; }
            .games-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="main">

        <div class="header">
            <div class="logo">
                <span class="logo-emoji">🍪</span>
                <span>К</span><span>у</span><span>к</span><span>и</span>
                <span> </span>
                <span>Ч</span><span>е</span><span>к</span><span>е</span><span>р</span>
            </div>
            <div class="underline"></div>
            <div class="subtitle">✦ ПРОВЕРКА АККАУНТОВ ROBLOX ✦</div>
        </div>

        <div class="card">

            <div class="cookie-input-area">
                <label>📝 Вставьте куку текстом (или несколько, по одной на строку):</label>
                <textarea id="cookieTextInput" placeholder='_|WARNING:-DO-NOT-SHARE-this-file.-...&#10;или&#10;.ROBLOSECURITY=...'></textarea>
            </div>

            <div class="drop-zone" id="dropZone">
                <span class="icon">📂</span>
                <p><strong>Или перетащите</strong> файлы с куками</p>
                <div class="hint">.txt · .cookie · до 3 файлов</div>
                <input type="file" id="fileInput" multiple />
            </div>

            <div class="file-list" id="fileList"></div>

            <div class="status" id="status">📌 Вставьте куку или загрузите файл</div>

            <div class="progress-wrap" id="progressWrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="checkBtn">🔍 Проверить</button>
                <button class="btn btn-danger" id="clearBtn">🗑 Очистить</button>
                <button class="btn btn-exit" id="exitBtn" style="display:none;">🚪 Выйти</button>
            </div>

            <div class="proxy-status" id="proxyStatus">
                <span class="dot yellow"></span> Прокси: corsproxy.io
            </div>

            <div class="result-container" id="resultContainer"></div>

        </div>
    </div>

    <script>
        (function() {
            'use strict';

            let rawFiles = [];
            let results = [];
            let isChecking = false;
            let currentSessionCookie = null;

            const cookieTextInput = document.getElementById('cookieTextInput');
            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const fileList = document.getElementById('fileList');
            const status = document.getElementById('status');
            const checkBtn = document.getElementById('checkBtn');
            const clearBtn = document.getElementById('clearBtn');
            const exitBtn = document.getElementById('exitBtn');
            const progressWrap = document.getElementById('progressWrap');
            const progressBar = document.getElementById('progressBar');
            const resultContainer = document.getElementById('resultContainer');
            const proxyStatus = document.getElementById('proxyStatus');

            // ===== ПРЯМОЙ ЗАПРОС К ROOBLOX API =====
            async function checkCookieDirect(cookie) {
                try {
                    const response = await fetch('https://www.roblox.com/mobileapi/userinfo', {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                            'Cookie': `.ROBLOSECURITY=${cookie}`
                        }
                    });

                    if (!response.ok) {
                        return { error: `HTTP ${response.status}`, userId: null, games: {} };
                    }

                    const data = await response.json();

                    if (!data || data.error || !data.UserName) {
                        return { error: 'Кука невалидна или истекла', userId: null, games: {} };
                    }

                    let games = {};
                    try {
                        const profileResp = await fetch(`https://www.roblox.com/users/${data.UserID || data.id}/profile`, {
                            headers: {
                                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                                'Cookie': `.ROBLOSECURITY=${cookie}`
                            }
                        });
                        if (profileResp.ok) {
                            const html = await profileResp.text();
                            games = parseGames(html);
                        }
                    } catch (e) {}

                    return {
                        displayName: data.UserName || data.displayName || data.name || 'Без имени',
                        robux: data.RobuxBalance || data.robux || 0,
                        userId: data.UserID || data.id || null,
                        games: games
                    };
                } catch (err) {
                    return { error: err.message || 'Ошибка запроса', userId: null, games: {} };
                }
            }

            function parseGames(html) {
                const games = {};
                const patterns = [
                    /Blox Fruits[:\s]+(\d+)/i,
                    /Adopt Me[:\s]+(\d+)/i,
                    /Murder Mystery[:\s]+(\d+)/i,
                    /King Legacy[:\s]+(\d+)/i,
                    /Toilet Tower Defense[:\s]+(\d+)/i,
                    /Pet Simulator[:\s]+(\d+)/i,
                    /Grand Piece Online[:\s]+(\d+)/i,
                    /Blade Ball[:\s]+(\d+)/i,
                    /Fisch[:\s]+(\d+)/i,
                    /Volleyball Legends[:\s]+(\d+)/i,
                    /Sailor Piece[:\s]+(\d+)/i,
                    /Your Bizarre Adventure[:\s]+(\d+)/i,
                    /Bee Swarm Simulator[:\s]+(\d+)/i,
                    /Anime Vanguard[:\s]+(\d+)/i,
                    /RIVALS[:\s]+(\d+)/i,
                    /Tailbreak[:\s]+(\d+)/i,
                    /Evade[:\s]+(\d+)/i,
                    /Da Hood[:\s]+(\d+)/i,
                    /Grow a Garden[:\s]+(\d+)/i,
                ];
                for (let pattern of patterns) {
                    const match = html.match(pattern);
                    if (match) {
                        const name = match[0].replace(/[:\s]+\d+$/, '').trim();
                        games[name] = parseInt(match[1], 10);
                    }
                }
                return games;
            }

            function extractCookies(text) {
                const lines = text.split(/\r?\n/);
                const found = [];
                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;

                    if (line.startsWith('_|WARNING')) {
                        const cookieMatch = line.match(/_\|WARNING[^:]*:([^\s]+)/i);
                        if (cookieMatch && cookieMatch[1].length > 10) {
                            found.push(cookieMatch[1]);
                        } else {
                            const parts = line.split(':');
                            if (parts.length > 1) {
                                const cookiePart = parts.slice(1).join(':').trim();
                                if (cookiePart.length > 10) found.push(cookiePart);
                            }
                        }
                        continue;
                    }

                    const warningMatch = line.match(/_\|WARNING[^\s]*/i);
                    if (warningMatch) {
                        const cookieMatch = warningMatch[0].match(/_\|WARNING[^:]*:([^\s]+)/i);
                        if (cookieMatch && cookieMatch[1].length > 10) {
                            found.push(cookieMatch[1]);
                        }
                        continue;
                    }

                    const robloxMatch = line.match(/\.ROBLOSECURITY=([^\s]+)/i);
                    if (robloxMatch) {
                        found.push(robloxMatch[1]);
                        continue;
                    }

                    const hexMatch = line.match(/^([A-Fa-f0-9]{32,})$/);
                    if (hexMatch) {
                        found.push(hexMatch[1]);
                        continue;
                    }

                    if (line.length > 40 && !line.includes(' ') && !line.includes(':')) {
                        found.push(line);
                    }
                }
                return found;
            }

            function getAvatarUrl(userId) {
                if (!userId) return null;
                return `https://www.roblox.com/headshot-thumbnail/image?userId=${userId}&width=100&height=100&format=png`;
            }

            function getCookiesFromInputs() {
                const all = [];
                const text = cookieTextInput.value;
                if (text.trim()) {
                    const cookies = extractCookies(text);
                    all.push(...cookies);
                }
                for (let f of rawFiles) {
                    const cookies = extractCookies(f.content);
                    all.push(...cookies);
                }
                return [...new Set(all)];
            }

            function updateStatus() {
                const cookies = getCookiesFromInputs();
                const count = cookies.length;
                if (count === 0) {
                    status.innerHTML = '📌 Вставьте куку или загрузите файл';
                } else {
                    status.innerHTML = `✅ Найдено ${count} кук. Нажмите "Проверить".`;
                }
                return cookies;
            }

            function renderFiles() {
                fileList.innerHTML = '';
                if (rawFiles.length === 0) {
                    const empty = document.createElement('span');
                    empty.style.color = '#4a6a4a';
                    empty.style.fontSize = '0.8rem';
                    empty.textContent = 'Нет загруженных файлов';
                    fileList.appendChild(empty);
                    return;
                }
                rawFiles.forEach((f, idx) => {
                    const tag = document.createElement('span');
                    tag.className = 'file-tag';
                    const count = extractCookies(f.content).length;
                    tag.innerHTML = `📄 ${f.name} (${count} кук) <button data-idx="${idx}">✕</button>`;
                    tag.querySelector('button').addEventListener('click', (e) => {
                        const i = parseInt(e.target.dataset.idx, 10);
                        rawFiles.splice(i, 1);
                        renderFiles();
                        updateStatus();
                    });
                    fileList.appendChild(tag);
                });
            }

            function renderResults(data, cookie) {
                resultContainer.innerHTML = '';

                const card = document.createElement('div');
                card.className = 'cookie-card';

                let avatarHtml = '';
                if (data.error) {
                    avatarHtml = `<div class="avatar placeholder">❌</div>`;
                } else if (data.userId) {
                    const avatarUrl = getAvatarUrl(data.userId);
                    avatarHtml =
                        `<img class="avatar" src="${avatarUrl}" alt="Avatar" loading="lazy" onerror="this.className='avatar placeholder';this.textContent='👤'" />`;
                } else {
                    avatarHtml = `<div class="avatar placeholder">👤</div>`;
                }

                let content = '';
                if (data.error) {
                    content = `<div class="error">❌ ${data.error}</div>`;
                } else {
                    let gamesHtml = '';
                    const gameKeys = Object.keys(data.games || {});
                    if (gameKeys.length > 0) {
                        gamesHtml = '<div class="games-grid">';
                        for (let key of gameKeys) {
                            const val = data.games[key];
                            const valClass = val === 0 || val === '0' ? 'game-value zero' : 'game-value';
                            gamesHtml += `
                                <div class="game-item">
                                    <span class="game-name">${key}</span>
                                    <span class="${valClass}">${val}</span>
                                </div>
                            `;
                        }
                        gamesHtml += '</div>';
                    } else {
                        gamesHtml = `<div class="no-games">🎮 Нет данных об играх</div>`;
                    }

                    content = `
                        <div class="top-row">
                            ${avatarHtml}
                            <div class="user-info">
                                <div class="name">${data.displayName || '—'}</div>
                                <div class="robux">${data.robux !== undefined && data.robux !== null ? data.robux : '—'} R$</div>
                                <div class="user-id">ID: ${data.userId || '—'}</div>
                            </div>
                        </div>
                        ${gamesHtml}
                    `;

                    currentSessionCookie = cookie;

                    content += `
                        <div class="gamepass-section">
                            <div class="question">
                                <span class="icon">❓</span>
                                Купить Gamepass?
                            </div>
                            <div class="gamepass-buttons">
                                <button class="btn btn-success" id="gamepassYes">✅ Да</button>
                                <button class="btn btn-danger" id="gamepassNo">❌ Нет</button>
                            </div>
                            <div class="gamepass-input-area" id="gamepassInputArea">
                                <input type="text" id="gamepassUrlInput" placeholder="https://www.roblox.com/game-pass/1234567/..." />
                                <div class="buy-row">
                                    <button class="btn btn-primary" id="gamepassBuyBtn">💎 Купить</button>
                                    <span style="color:#4a6a4a;font-size:0.8rem;" id="gamepassPriceInfo"></span>
                                </div>
                                <div class="gamepass-result" id="gamepassResult"></div>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    ${content}
                    <div class="cookie-preview">${cookie ? cookie.substring(0, 25) + '...' : '...'}</div>
                `;

                resultContainer.appendChild(card);

                const yesBtn = card.querySelector('#gamepassYes');
                const noBtn = card.querySelector('#gamepassNo');
                const inputArea = card.querySelector('#gamepassInputArea');
                const buyBtn = card.querySelector('#gamepassBuyBtn');
                const urlInput = card.querySelector('#gamepassUrlInput');
                const resultDiv = card.querySelector('#gamepassResult');

                if (yesBtn) {
                    yesBtn.addEventListener('click', () => {
                        inputArea.classList.add('show');
                        resultDiv.classList.remove('show');
                        resultDiv.className = 'gamepass-result';
                    });
                }

                if (noBtn) {
                    noBtn.addEventListener('click', () => {
                        inputArea.classList.remove('show');
                        resultDiv.classList.remove('show');
                        resultDiv.className = 'gamepass-result';
                    });
                }

                if (buyBtn) {
                    buyBtn.addEventListener('click', async () => {
                        const url = urlInput.value.trim();
                        if (!url) {
                            resultDiv.className = 'gamepass-result show error';
                            resultDiv.textContent = '⚠️ Введите ссылку на Gamepass';
                            return;
                        }

                        resultDiv.className = 'gamepass-result show';
                        resultDiv.textContent = '⏳ Покупка...';
                        resultDiv.style.color = '#ffd700';

                        const result = await buyGamepass(cookie, url);

                        if (result.success) {
                            resultDiv.className = 'gamepass-result show success';
                            resultDiv.textContent = `✅ ${result.message}`;
                            const newData = await checkCookieDirect(cookie);
                            if (!newData.error) {
                                const robuxSpan = card.querySelector('.robux');
                                if (robuxSpan) {
                                    robuxSpan.textContent = `${newData.robux || 0} R$`;
                                }
                            }
                        } else {
                            resultDiv.className = 'gamepass-result show error';
                            resultDiv.textContent = `❌ ${result.error}`;
                        }
                    });
                }

                exitBtn.style.display = 'inline-block';
            }

            async function buyGamepass(cookie, gamepassUrl) {
                try {
                    const idMatch = gamepassUrl.match(/\/(\d+)(?:\?|$)/);
                    if (!idMatch) {
                        return { success: false, error: 'Неверная ссылка на Gamepass' };
                    }
                    const passId = idMatch[1];

                    const infoResp = await fetch(`https://www.roblox.com/game-pass/${passId}/`, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                            'Cookie': `.ROBLOSECURITY=${cookie}`
                        }
                    });
                    if (!infoResp.ok) {
                        return { success: false, error: 'Не удалось получить информацию о Gamepass' };
                    }
                    const html = await infoResp.text();
                    const priceMatch = html.match(/"price":(\d+)/i);
                    if (!priceMatch) {
                        return { success: false, error: 'Не удалось определить цену Gamepass' };
                    }
                    const price = parseInt(priceMatch[1], 10);

                    const userData = await checkCookieDirect(cookie);
                    if (userData.error) {
                        return { success: false, error: 'Не удалось проверить баланс' };
                    }

                    if (userData.robux < price) {
                        return {
                            success: false,
                            error: `Недостаточно Robux! Нужно: ${price}, у вас: ${userData.robux}`
                        };
                    }

                    const buyResp = await fetch(`https://www.roblox.com/game-pass/${passId}/purchase`, {
                        method: 'POST',
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                            'Cookie': `.ROBLOSECURITY=${cookie}`,
                            'Content-Type': 'application/json',
                            'X-CSRF-TOKEN': 'fetch'
                        },
                        body: JSON.stringify({})
                    });

                    if (!buyResp.ok) {
                        return { success: false, error: `Ошибка покупки: HTTP ${buyResp.status}` };
                    }

                    return { success: true, message: `Gamepass успешно куплен за ${price} R$!` };
                } catch (err) {
                    return { success: false, error: err.message || 'Ошибка при покупке' };
                }
            }

            async function runCheck() {
                if (isChecking) return;

                const cookies = getCookiesFromInputs();
                if (cookies.length === 0) {
                    status.innerHTML = '⚠️ Нет кук для проверки. Вставьте куку или загрузите файл.';
                    return;
                }

                isChecking = true;
                checkBtn.disabled = true;
                progressWrap.style.display = 'block';
                results = [];
                resultContainer.innerHTML = '';
                exitBtn.style.display = 'none';
                proxyStatus.innerHTML = `<span class="dot yellow"></span> ⏳ Проверка...`;

                const total = cookies.length;

                for (let i = 0; i < total; i++) {
                    const cookie = cookies[i];
                    progressBar.style.width = `${((i + 1) / total) * 100}%`;
                    status.innerHTML = `⏳ Проверка ${i + 1}/${total}...`;

                    const res = await checkCookieDirect(cookie);
                    results.push({ cookie, data: res });

                    if (i === 0) {
                        renderResults(res, cookie);
                        if (res.error) {
                            proxyStatus.innerHTML = `<span class="dot red"></span> ❌ Ошибка: ${res.error}`;
                        } else {
                            proxyStatus.innerHTML = `<span class="dot green"></span> ✅ Успешно!`;
                        }
                    }

                    await new Promise(r => setTimeout(r, 500));
                }

                progressBar.style.width = '100%';
                status.innerHTML = `✅ Проверено ${total} кук.`;
                checkBtn.disabled = false;
                isChecking = false;

                setTimeout(() => { progressWrap.style.display = 'none'; }, 1500);
            }

            function handleFiles(files) {
                const allowed = 3;
                if (rawFiles.length + files.length > allowed) {
                    alert(`Максимум ${allowed} файлов. Удалите лишние.`);
                    return;
                }
                for (let file of files) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        rawFiles.push({ name: file.name, content: e.target.result });
                        renderFiles();
                        updateStatus();
                    };
                    reader.readAsText(file);
                }
            }

            cookieTextInput.addEventListener('input', updateStatus);

            fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                fileInput.value = '';
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'rgba(0, 255, 120, 0.5)';
            });
            dropZone.addEventListener('dragleave', () => {
                dropZone.style.borderColor = 'rgba(0, 255, 120, 0.15)';
            });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.style.borderColor = 'rgba(0, 255, 120, 0.15)';
                handleFiles(e.dataTransfer.files);
            });
            dropZone.addEventListener('click', () => fileInput.click());

            checkBtn.addEventListener('click', runCheck);

            exitBtn.addEventListener('click', () => {
                currentSessionCookie = null;
                resultContainer.innerHTML = '';
                exitBtn.style.display = 'none';
                status.innerHTML = '🚪 Сессия завершена. Вставьте новую куку.';
                rawFiles = [];
                results = [];
                renderFiles();
                cookieTextInput.value = '';
                updateStatus();
                proxyStatus.innerHTML = `<span class="dot yellow"></span> Прокси: corsproxy.io`;
            });

            clearBtn.addEventListener('click', () => {
                rawFiles = [];
                results = [];
                currentSessionCookie = null;
                resultContainer.innerHTML = '';
                progressWrap.style.display = 'none';
                progressBar.style.width = '0%';
                exitBtn.style.display = 'none';
                cookieTextInput.value = '';
                renderFiles();
                updateStatus();
                status.innerHTML = '🗑 Всё очищено. Вставьте новые куки.';
                checkBtn.disabled = false;
                isChecking = false;
                proxyStatus.innerHTML = `<span class="dot yellow"></span> Прокси: corsproxy.io`;
            });

            renderFiles();
            updateStatus();
        })();
    </script>
</body>
</html>
